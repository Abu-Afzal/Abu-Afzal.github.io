<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Administrasi Sekolah Terintegrasi</title>
    <style>
        :root {
            --bg: #f4f6f9;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --card-radius: 14px;
            --shadow: 0 6px 16px rgba(0,0,0,0.08);
            --shadow-hover: 0 10px 24px rgba(0,0,0,0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 40px; }
        .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
        
        header { 
            background: #ffffff; padding: 20px 24px; border-radius: var(--card-radius); 
            box-shadow: var(--shadow); margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
        }
        header h1 { font-size: 1.6rem; color: #1a237e; font-weight: 700; }
        header p { color: var(--text-light); font-size: 0.95rem; margin-top: 4px; }
        .badge { background: #e8f5e9; color: #2e7d32; padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        
        .section-title { font-size: 1.25rem; margin: 28px 0 16px; padding-left: 12px; border-left: 5px solid #1a237e; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
        
        /* Link wrapper styling */
        .card-link { text-decoration: none; color: inherit; display: block; cursor: pointer; }
        
        .card { 
            background: #ffffff; padding: 22px 16px; border-radius: var(--card-radius); 
            box-shadow: var(--shadow); transition: all 0.25s ease; 
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; position: relative; overflow: hidden; height: 100%;
        }
        .card-link:hover .card { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
        
        .card-icon { font-size: 2.2rem; margin-bottom: 6px; }
        .card-title { font-weight: 600; font-size: 1rem; }
        .card-desc { font-size: 0.82rem; opacity: 0.9; }
        
        /* Logo styling untuk Pusaka */
        .card-logo {
            width: 56px;
            height: 56px;
            margin-bottom: 6px;
            object-fit: contain;
        }
        
        .status-tag { 
            font-size: 0.72rem; margin-top: 8px; padding: 4px 10px; border-radius: 12px; font-weight: 600;
            display: inline-block; background: rgba(255,255,255,0.2);
        }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #ffffff; padding: 28px; border-radius: var(--card-radius); width: 92%; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #64748b; line-height: 1; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 0.95rem; transition: border 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a237e; }
        .btn { background: #1a237e; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; font-size: 0.95rem; transition: background 0.2s; }
        .btn:hover { background: #283593; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .log-area { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 0.82rem; max-height: 140px; overflow-y: auto; margin-top: 16px; line-height: 1.4; }
        
        footer { text-align: center; margin-top: 48px; color: var(--text-light); font-size: 0.85rem; }
        
        @media (max-width: 640px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏫 Portal Administrasi Sekolah</h1>
                <p>Integrasi data kepegawaian & layanan madrasah dalam satu pintu</p>
            </div>
            <div class="badge">✅ Sistem Online</div>
        </header>

        <h2 class="section-title">Layanan Umum </h3>
        <div class="grid" id="layanan-umum"></div>

        <h2 class="section-title">Layanan Madrasah</h3>
        <div class="grid" id="layanan-madrasah"></div>
    </div>

    <!-- Modal (Disimpan untuk kebutuhan internal jika diperlukan) -->
    <div class="modal" id="integrationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Konfigurasi Internal</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>Catatan Administrator</label>
                <input type="text" placeholder="Fitur ini untuk pengembangan internal...">
            </div>
            <button class="btn" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <footer>
        &copy; 2026 Portal Administrasi Sekolah Terintegrasi. Dibuat untuk efisiensi manajemen madrasah modern.
    </footer>

    <script>
        // ============================================
        // 🔧 KONFIGURASI LAYANAN UMUM
        // ============================================
        // CARA MENAMBAH/MENGEDIT LOGO PUSAKA:
        // 1. Simpan file logo Pusaka (logo-pusaka.png) di folder yang sama dengan file HTML ini
        // 2. Ubah 'logo' di bawah dari null menjadi 'logo-pusaka.png'
        // 3. Jika tidak ada logo, sistem akan otomatis pakai icon 💧
        
        const layananUmum = [
            { 
                id: 'pusaka', 
                title: 'Absensi Pusaka', 
                desc: '',  //
                color: '#9c27b0', 
                url: 'https://pusaka-v3.kemenag.go.id/',
                icon: '💧',  // Icon default (tetesan air)
            },
            { 
                id: 'pusaka', 
                title: 'Pelaporan Pusaka', 
                desc: '',  //
                color: '#9c27b0', 
                url: 'https://absensi.kemenag.go.id',
                icon: '📜',  // Icon default (tetesan air)
                logo: null   // Ganti dengan 'logo-pusaka.png' jika ada file logo
            },
            { 
                id: 'myasn', 
                icon: '👤', 
                title: 'MyASN BKN', 
                desc: '',  //
                color: '#673ab7', 
                url: 'https://myasn.bkn.go.id/' 
            },
            { 
                id: 'emis', 
                icon: '💻', 
                title: 'EMIS GTK', 
                desc: '',  //
                color: '#7e57c2', 
                url: 'https://emis.kemenag.go.id/' 
            },
            { 
                id: 'simpeg', 
                icon: '📘', 
                title: 'SIMPEG 5', 
                desc: '',  // 
                color: '#546e7a', 
                url: 'https://simpeg5.kemenag.go.id/' 
            }
        ];

        const layananMadrasah = [
            { icon: '🌐', title: 'Website', desc: 'Portal resmi madrasah', color: '#37474f' },
            { icon: '🧾', title: 'PMBM', desc: 'Pendaftaran siswa baru', color: '#00695c' },
            { icon: '🏢', title: 'PTSP', desc: 'Pelayanan administrasi', color: '#00897b' },
            { icon: '📖', title: 'NILABS', desc: 'Nilai & absensi digital', color: '#3949ab' },
            { icon: '✅', title: 'SiTaat', desc: 'Sistem tata tertib', color: '#f57c00' },
            { icon: '🪪', title: 'SIDIKS', desc: 'Data kependudukan siswa', color: '#263238' },
            { icon: '🎓', title: 'E-Learning', desc: 'Pembelajaran daring', color: '#d32f2f' },
            { icon: '📁', title: 'E-Dokumen', desc: 'Arsip digital sekolah', color: '#1e88e5' },
            { icon: '🏥', title: 'UKSmart', desc: 'Usaha Kesehatan Sekolah', color: '#e91e63' },
            { icon: '📚', title: 'E-Perpus', desc: 'Perpustakaan digital', color: '#6d4c41' },
            { icon: '🎯', title: 'Ekskul', desc: 'Manajemen ekskul', color: '#009688' },
            { icon: '👁️', title: 'Supervisi', desc: 'Monitoring & evaluasi', color: '#78909c' },
            { icon: '🏆', title: 'Prestasi', desc: 'Data prestasi siswa', color: '#546e7a' },
            { icon: '📊', title: 'PKKM', desc: 'Penilaian kinerja', color: '#1b5e20' },
            { 
                id: 'rdm', 
                icon: '📗', 
                title: 'RDM', 
                desc: 'Akses Rapor Digital', 
                color: '#7e57c2', 
                url: 'https://manbantaeng.rdmnet.my.id/'  // ← Link eksternal
            },
            { icon: '📈', title: 'ScoreUp!', desc: 'Analitik & rapor kinerja', color: '#c62828' }
        ];

        // Render kartu
        function renderCards() {
            const umumContainer = document.getElementById('layanan-umum');
            const madrasahContainer = document.getElementById('layanan-madrasah');

            // Layanan Umum: LINK langsung ke sistem eksternal
            umumContainer.innerHTML = layananUmum.map(item => {
                // Cek apakah ada logo custom
                const displayContent = item.logo 
                    ? `<img src="${item.logo}" alt="${item.title}" class="card-logo">`
                    : `<div class="card-icon">${item.icon}</div>`;

                return `
                    <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="card-link">
                        <div class="card" style="background: ${item.color}; color: white;">
                            ${displayContent}
                            <div class="card-title">${item.title}</div>
                            <div class="card-desc">${item.desc}</div>
                        </div>
                    </a>
                `;
            }).join('');

            // Layanan Madrasah: Support link jika item memiliki properti 'url'
madrasahContainer.innerHTML = layananMadrasah.map(item => {
    const cardContent = `
        <div class="card" style="background: ${item.color}; color: white;">
            <div class="card-icon">${item.icon}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-desc">${item.desc || ''}</div>
        </div>
    `;
    
    // Jika item memiliki 'url', bungkus dengan tag <a>; jika tidak, tampilkan biasa
    return item.url 
        ? `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="card-link">${cardContent}</a>`
        : cardContent;
}).join('');
        }

        // Modal Logic (Opsional)
        function openModal(title) {
            document.getElementById('modalTitle').textContent = `⚙️ ${title}`;
            document.getElementById('integrationModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('integrationModal').classList.remove('active');
        }
        document.getElementById('integrationModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Inisialisasi
        renderCards();
    </script>
</body>
</html>
