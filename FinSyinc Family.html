<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSync Pro - Cloud Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item.active { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border-right: 4px solid #38bdf8; }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
        <div class="p-8">
            <h1 class="text-xl font-bold text-blue-400 tracking-tight">Abu Afzal Finansial</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Kelola Titipan Dana Family</p>
        </div>
        <nav class="flex-1 mt-4">
            <button onclick="showSection('dashboard')" id="nav-dashboard" class="sidebar-item active w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">📊 Dashboard</button>
            <button onclick="showSection('transaksi')" id="nav-transaksi" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">💸 Transaksi</button>
            <button onclick="showSection('rekap')" id="nav-rekap" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">📜 Rekap Transaksi</button>
            <button onclick="showSection('manajemen')" id="nav-manajemen" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">👥 Kelola Pemilik</button>
        </nav>
        <div class="p-8 border-t border-slate-800">
            <p class="text-[10px] text-slate-500 uppercase">Saldo Gabungan</p>
            <p id="total-rekening-sidebar" class="text-sm font-bold text-white tracking-wide">Rp 0</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto p-8 bg-slate-950">
        
        <section id="section-dashboard" class="content-section active">
            <h2 class="text-2xl font-bold mb-8">Ringkasan Saldo</h2>
            <div id="balance-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>
        </section>

        <section id="section-transaksi" class="content-section max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold mb-8 text-center">Catat Arus Kas</h2>
            <div class="glass-card p-8 rounded-3xl">
                <form id="finance-form" class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" onclick="setType('in')" id="btn-in" class="py-3 rounded-2xl bg-blue-500/20 text-blue-400 border border-blue-500/50 font-bold transition-all">Masuk</button>
                        <button type="button" onclick="setType('out')" id="btn-out" class="py-3 rounded-2xl bg-slate-800 text-slate-500 border border-slate-700 font-bold transition-all">Keluar</button>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 uppercase mb-2">Pemilik Dana</label>
                        <select id="owner-select" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 uppercase mb-2">Nominal (Rp)</label>
                        <input type="number" id="amount" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none text-xl font-bold text-blue-400">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-500 uppercase mb-2">Keterangan</label>
                        <input type="text" id="desc" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-xl">Simpan Transaksi</button>
                </form>
            </div>
        </section>

        <section id="section-rekap" class="content-section">
            <h2 class="text-2xl font-bold mb-8">Histori Lengkap</h2>
            <div class="glass-card rounded-3xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-[10px] uppercase text-slate-500">
                        <tr>
                            <th class="px-6 py-4">Waktu & Tanggal</th>
                            <th class="px-6 py-4">Pemilik</th>
                            <th class="px-6 py-4">Deskripsi</th>
                            <th class="px-6 py-4">Nominal</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="full-history-logs"></tbody>
                </table>
            </div>
        </section>

        <!-- Cari bagian SECTION: MANAJEMEN di kode Anda -->
<section id="section-manajemen" class="content-section">
    <h2 class="text-2xl font-bold mb-8">Kelola Pemilik</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <!-- KOLOM KIRI: FORM TAMBAH -->
        <div class="glass-card p-6 rounded-3xl h-fit">
            <h4 class="font-bold mb-4 text-emerald-400">Tambah Pemilik</h4>
            
            <!-- Input Nama -->
            <input type="text" id="new-owner-name" placeholder="Masukkan nama..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 mb-4 outline-none">
            
            <!-- SIMPAN TOMBOL DI SINI -->
            <button id="add-owner-btn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">Tambah</button>
            
        </div>

        <!-- KOLOM KANAN: TABEL DAFTAR PEMILIK -->
        <div class="md:col-span-2 glass-card rounded-3xl overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-white/5">
                    <tr>
                        <th class="px-6 py-4">Nama</th>
                        <th class="px-6 py-4">Saldo</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="owner-list-table"></tbody>
            </table>
        </div>
    </div>
</section>
    </main>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC2rhK8et5UvZ5IEKRy21qjk3gRhc9-FUU",
        authDomain: "finsync-family.firebaseapp.com",
        projectId: "finsync-family",
        storageBucket: "finsync-family.firebasestorage.app",
        messagingSenderId: "363860293467",
        appId: "1:363860293467:web:81947477674fdeaa514c7e",
        databaseURL: "https://finsync-family-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // State Internal
    let owners = [];
    let transactions = [];
    let currentType = 'in';

    const formatIDR = (n) => "Rp " + new Intl.NumberFormat('id-ID').format(n);

    // --- FUNGSI GLOBAL (Didaftarkan ke window agar bisa dipanggil HTML) ---
    window.showSection = (id) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        document.getElementById('section-' + id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
    };

    window.setType = (t) => {
        currentType = t;
        const btnIn = document.getElementById('btn-in');
        const btnOut = document.getElementById('btn-out');
        btnIn.className = t === 'in' ? "py-3 rounded-2xl bg-blue-500/20 text-blue-400 border border-blue-500/50 font-bold" : "py-3 rounded-2xl bg-slate-800 text-slate-500 border border-slate-700 font-bold";
        btnOut.className = t === 'out' ? "py-3 rounded-2xl bg-red-500/20 text-red-400 border border-red-500/50 font-bold" : "py-3 rounded-2xl bg-slate-800 text-slate-500 border border-slate-700 font-bold";
    };

    // --- LOGIKA RENDER ---
    const render = () => {
        // Render Kartu Saldo
        document.getElementById('balance-cards').innerHTML = owners.map(o => `
            <div class="glass-card p-6 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">${o.name}</p>
                <h3 class="text-2xl font-bold mt-1">${formatIDR(o.balance)}</h3>
            </div>`).join('');

        // Render Dropdown Pilihan Pemilik
        document.getElementById('owner-select').innerHTML = owners.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
        
        // Render Tabel Manajemen Pemilik
        document.getElementById('owner-list-table').innerHTML = owners.map(o => `
            <tr class="border-b border-white/5">
                <td class="px-6 py-4 font-bold text-slate-300">${o.name}</td>
                <td class="px-6 py-4 text-blue-400 font-semibold">${formatIDR(o.balance)}</td>
                <td class="px-6 py-4 text-center">
                    <button onclick="editOwner('${o.id}', '${o.name}')" class="text-blue-400 mr-4 text-xs font-bold">Edit</button>
                    <button onclick="deleteOwner('${o.id}')" class="text-red-400 text-xs font-bold">Hapus</button>
                </td>
            </tr>`).join('');

        // Render Tabel Rekap Transaksi (Fitur Baru)
        document.getElementById('full-history-logs').innerHTML = transactions.map((t) => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                <td class="px-6 py-4 text-slate-400 text-[11px] leading-relaxed">${t.date} <br> <span class="text-slate-600">${t.time}</span></td>
                <td class="px-6 py-4 font-bold text-slate-300">${t.ownerName}</td>
                <td class="px-6 py-4 text-slate-400 text-xs">${t.desc}</td>
                <td class="px-6 py-4 font-bold ${t.type === 'in' ? 'text-emerald-400' : 'text-red-400'}">
                    ${t.type === 'in' ? '+' : '-'} ${formatIDR(t.amount)}
                </td>
                <td class="px-6 py-4 text-center">
                    <button onclick="editTransaction('${t.id}')" class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-lg text-[10px] font-bold border border-blue-500/30">EDIT</button>
                </td>
            </tr>`).join('');

        // Update Saldo Akumulasi Gabungan
        const total = owners.reduce((a, b) => a + (b.balance || 0), 0);
        document.getElementById('total-rekening-sidebar').innerText = formatIDR(total);
    };

    // --- FIREBASE SYNC ---
    onValue(ref(db, 'finSync/owners'), (snapshot) => {
        const data = snapshot.val();
        owners = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        render();
    });

    onValue(ref(db, 'finSync/transactions'), (snapshot) => {
        const data = snapshot.val();
        transactions = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })).reverse() : [];
        render();
    });

    // --- EVENT HANDLERS (Perbaikan Utama) ---

    // Fungsi Tambah Pemilik
    document.getElementById('add-owner-btn').addEventListener('click', () => {
        const nameInput = document.getElementById('new-owner-name');
        const name = nameInput.value.trim();
        if(name) {
            push(ref(db, 'finSync/owners'), { name, balance: 0 });
            nameInput.value = "";
        }
    });

    // Fungsi Submit Transaksi
    document.getElementById('finance-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const ownerId = document.getElementById('owner-select').value;
        const amount = parseInt(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if(!amount || !desc || !ownerId) return;

        const owner = owners.find(o => o.id === ownerId);
        const now = new Date();
        
        const tRef = push(ref(db, 'finSync/transactions'));
        set(tRef, {
            ownerId, ownerName: owner.name, amount, desc, type: currentType,
            date: now.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short', year:'numeric'}),
            time: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
        });

        const newBalance = owner.balance + (currentType === 'in' ? amount : -amount);
        update(ref(db, `finSync/owners/${ownerId}`), { balance: newBalance });

        e.target.reset();
        showSection('rekap');
    });

    // Daftarkan aksi tabel ke window agar tombol HTML bisa akses
    window.deleteOwner = (id) => {
        if(confirm('Hapus pemilik?')) remove(ref(db, `finSync/owners/${id}`));
    };

    window.editOwner = (id, oldName) => {
        const n = prompt('Nama baru:', oldName);
        if(n) update(ref(db, `finSync/owners/${id}`), { name: n });
    };

    window.editTransaction = (tId) => {
        const t = transactions.find(x => x.id === tId);
        const owner = owners.find(o => o.id === t.ownerId);
        if(!owner) return;
        
        const revertedBalance = owner.balance + (t.type === 'in' ? -t.amount : t.amount);
        update(ref(db, `finSync/owners/${t.ownerId}`), { balance: revertedBalance });
        
        document.getElementById('amount').value = t.amount;
        document.getElementById('desc').value = t.desc;
        document.getElementById('owner-select').value = t.ownerId;
        setType(t.type);
        
        remove(ref(db, `finSync/transactions/${tId}`));
        showSection('transaksi');
    };

</script>
</body>
</html>
