<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru - Buat Sesi E-Learning</title>
    <link rel="stylesheet" href="css/elearning.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>📚 Buat Sesi Pembelajaran Baru</h2>
            <p class="subtitle">Sistem E-Learning Tanpa Akun Siswa</p>
            <hr>

            <form id="formSesi" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>Judul Pembelajaran / Materi *</label>
                    <input type="text" id="sessionTitle" placeholder="Contoh: Bab 3 - Sejarah Peradaban Islam" required>
                </div>

                <fieldset>
                    <legend>📖 Konten Materi Pembelajaran</legend>
                    
                    <div class="form-group">
                        <label>Materi Singkat (Teks)</label>
                        <textarea id="materialText" rows="5" placeholder="Tuliskan ringkasan materi atau instruksi di sini..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Foto Buku Paket / Gambar (Maks 5MB - Otomatis Dikompres)</label>
                        <input type="file" id="materialImage" accept="image/*" onchange="previewDanKompresGbr(event)">
                        <div id="imagePreviewContainer" style="display:none; margin-top:10px;">
                            <img id="imgPreview" src="" alt="Preview" style="max-width: 100%; height: auto; border-radius: 8px;">
                            <p id="imgInfo" class="info-text"></p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Link Video YouTube</label>
                        <input type="url" id="materialYoutube" placeholder="Contoh: https://www.youtube.com/watch?v=...">
                    </div>
                </fieldset>

                <fieldset>
                    <legend>📝 Soal Kuis Pilihan Ganda</legend>
                    <div id="quizContainer">
                        </div>
                    <button type="button" class="btn btn-secondary" onclick="tambahKomponenSoal()">➕ Tambah Soal Kuis</button>
                </fieldset>

                <fieldset>
                    <legend>⚙️ Pengaturan Tambahan</legend>
                    <div class="checkbox-group">
                        <input type="checkbox" id="requireAssignment">
                        <label for="requireAssignment">Siswa wajib mengunggah file tugas esai/catatan di akhir sesi</label>
                    </div>
                </fieldset>

                <div class="action-area">
                    <button type="button" class="btn btn-primary" id="btnSimpanSesi" onclick="simpanSesiKeFirestore()">💾 Simpan & Ambil PIN Sesi</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/elearning.js"></script>
</body>
</html>
