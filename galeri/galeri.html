<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kegiatan Otomatis - SIPELITA</title>
    <link rel="stylesheet" href="../css/style.css"> 
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 30px; color: #1e293b;">📸 Galeri Dokumentasi Kegiatan</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 20px;">
            Terintegrasi otomatis dengan Folder Utama Google Drive Madrasah
        </p>

        <div id="loadingGaleri" style="text-align: center; padding: 40px; display: none;">
            <div class="spinner" style="margin: 0 auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="color: #6366f1; margin-top: 15px; font-weight: 500;">🔄 Menyingkronkan dengan Google Drive...</p>
        </div>

        <div class="galeri-grid" id="galeriKegiatanContainer"></div>
    </div>

    <script type="module" src="../js/load-galeri.js"></script>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
