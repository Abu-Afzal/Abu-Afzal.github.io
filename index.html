<body>
    <!-- 🔐 Script Proteksi Auth - Harus di paling atas -->
    <script src="js/auth.js"></script>
    <script>
        // Cek auth sebelum render halaman
        if (!Auth.checkAuth()) {
            window.location.href = 'login.html';
        }
    </script>
    
    <!-- ... sisa konten index.html ... -->
    
    <!-- Tambah tombol logout di header -->
    <header>
        <div>
            <h1>🏫 Portal Administrasi Sekolah</h1>
            <p>Integrasi data kepegawaian & layanan madrasah dalam satu pintu</p>
            <!-- Tampilkan info user -->
            <p id="userInfo" style="font-size: 0.85rem; color: #667eea; margin-top: 5px;"></p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="Auth.logout()" class="btn" style="padding: 8px 16px; font-size: 0.9rem;">
                🔐 Keluar
            </button>
            <div class="badge">✅ Sistem Online</div>
        </div>
    </header>
    
    <!-- ... sisa konten ... -->
    
    <!-- Script untuk tampilkan nama user -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const user = Auth.checkAuth();
            if (user && document.getElementById('userInfo')) {
                document.getElementById('userInfo').textContent = 
                    `Halo, ${user.name} (${user.role === 'admin' ? 'Admin' : 'Guru'})`;
            }
        });
    </script>
