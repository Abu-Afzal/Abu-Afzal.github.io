<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIPELITA</title>
    <link rel="icon" type="image/png" href="assets/images/icon-app.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/images/icon-app.png" alt="SIPELITA" class="login-logo" onerror="this.src='https://via.placeholder.com/80'">
                <h1>SIPELITA</h1>
                <p>Sistem Pengelolaan Edukasi & Layanan Terpadu</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username / NIP</label>
                    <input type="text" id="username" placeholder="Masukkan username atau NIP" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                
                <div class="form-group">
                    <label for="role">Role Pengguna</label>
                    <select id="role" required>
                        <option value="">Pilih Role...</option>
                        <option value="admin">👨‍💼 Administrator</option>
                        <option value="guru">👨‍🏫 Guru</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Masuk</span>
                    <span class="btn-loading" style="display:none;">Memproses...</span>
                </button>
                
                <div id="errorMsg" class="error-msg"></div>
            </form>
            
            <div class="login-footer">
                <p><small>Demo Credentials:</small></p>
                <p><small>🔹 Admin: admin / admin123</small></p>
                <p><small>🔹 Guru: guru / guru123</small></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
