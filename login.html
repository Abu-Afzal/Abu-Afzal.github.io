<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIPELITA</title>
    <link rel="icon" type="image/png" href="assets/images/sipelita-app.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-logo { width: 80px; height: 80px; margin-bottom: 20px; }
        .login-title { font-size: 1.5rem; font-weight: 700; color: #1a237e; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; }
        .form-group input:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
        .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-login:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .error-msg { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 20px; display: none; }
        .back-link { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #667eea; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="assets/images/sipelita-app.png" alt="Logo" class="login-logo">
        <h1 class="login-title">Login SIPELITA</h1>
        
        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@manbantaeng.sch.id" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" id="btnLogin" class="btn-login">Masuk</button>
        </form>

        <a href="home.html" class="back-link">← Kembali ke Beranda</a>
    </div>

    <script type="module">
        import { AuthService } from './js/auth-service.js';

        // Cek jika sudah login, langsung ke dashboard
        const user = AuthService.checkAuth();
        if (user) {
            window.location.href = 'index.html';
        }

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Memproses...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const result = await AuthService.login(email, password);

            if (result.success) {
                // Sukses -> Redirect ke Dashboard
                window.location.href = 'index.html';
            } else {
                // Gagal -> Tampilkan Error
                errorMsg.textContent = result.message;
                errorMsg.style.display = 'block';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Masuk';
            }
        });
    </script>
</body>
</html>
