<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abu Afzal Finansial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b; 
            overflow: hidden; 
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Mobile Sidebar Logic */
        #sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 50;
        }
        @media (max-width: 768px) {
            #sidebar.closed { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
        }
        .sidebar-item.active { 
            background: #eff6ff; 
            color: #2563eb; 
            border-right: 4px solid #2563eb; 
        }
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="flex h-screen">

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/20 hidden z-40"></div>

    <aside id="sidebar" class="fixed md:relative w-64 h-full bg-white border-r border-slate-200 flex flex-col closed md:transform-none">
        <div class="p-6">
            <h1 class="text-xl font-bold text-blue-600 tracking-tight">Abu Afzal Finansial</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Kelola Titipan Dana Family</p>
        </div>

        <nav class="flex-1 mt-4">
            <button onclick="navAction('dashboard')" id="nav-dashboard" class="sidebar-item active w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">📊 Dashboard</button>
            <button onclick="navAction('transaksi')" id="nav-transaksi" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">💸 Transaksi</button>
            <button onclick="navAction('rekap')" id="nav-rekap" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">📜 Rekap Transaksi</button>
            <button onclick="navAction('manajemen')" id="nav-manajemen" class="sidebar-item w-full flex items-center px-8 py-4 text-sm font-semibold transition-all text-left">👥 Kelola Pemilik</button>
        </nav>

        <div class="p-6 border-t border-slate-100 bg-slate-50">
            <p class="text-[10px] text-slate-400 uppercase font-bold">Total Saldo Rekening</p>
            <p id="total-rekening-sidebar" class="text-lg font-bold text-blue-600">Rp 0</p>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-50 relative">
        <header class="md:hidden flex items-center justify-between p-4 bg-white border-b sticky top-0 z-30">
            <button onclick="toggleMenu()" class="p-2 text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <span class="font-bold text-blue-600 text-sm">Abu Afzal Finansial</span>
            <div class="w-6"></div> </header>

        <div class="p-4 md:p-8">
            <section id="section-dashboard" class="content-section active">
                <h2 class="text-xl font-bold mb-6">Ringkasan Saldo</h2>
                <div id="balance-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </section>

            <section id="section-transaksi" class="content-section max-w-xl mx-auto">
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-lg font-bold mb-6">Catat Transaksi</h2>
                    <form id="finance-form" class="space-y-4">
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" onclick="setType('in')" id="btn-in" class="py-2 rounded-xl bg-blue-600 text-white font-bold text-sm">Masuk</button>
                            <button type="button" onclick="setType('out')" id="btn-out" class="py-2 rounded-xl bg-slate-100 text-slate-400 border font-bold text-sm">Keluar</button>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Pemilik</label>
                            <select id="owner-select" class="w-full bg-white border rounded-xl px-4 py-2 outline-none"></select>
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Nominal</label>
                            <input type="number" id="amount" class="w-full bg-white border rounded-xl px-4 py-2 outline-none font-bold text-blue-600">
                        </div>
                        <div>
                            <label class="text-[10px] uppercase font-bold text-slate-400">Keterangan</label>
                            <input type="text" id="desc" class="w-full bg-white border rounded-xl px-4 py-2 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200">Simpan</button>
                    </form>
                </div>
            </section>

            <section id="section-rekap" class="content-section">
                <h2 class="text-xl font-bold mb-6">Histori Transaksi</h2>
                <div class="glass-card rounded-2xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-[10px] uppercase text-slate-400">
                                <tr>
                                    <th class="px-4 py-3">Waktu</th>
                                    <th class="px-4 py-3">Pemilik</th>
                                    <th class="px-4 py-3">Deskripsi</th>
                                    <th class="px-4 py-3">Nominal</th>
                                    <th class="px-4 py-3 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="full-history-logs" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section id="section-manajemen" class="content-section">
                <h2 class="text-xl font-bold mb-6">Kelola Pemilik</h2>
                <div class="grid grid-cols-1 gap-6">
                    <div class="glass-card p-6 rounded-2xl">
                        <h4 class="font-bold mb-4 text-sm">Tambah Pemilik</h4>
                        <div class="flex gap-2">
                            <input type="text" id="new-owner-name" placeholder="Nama..." class="flex-1 bg-white border rounded-xl px-4 py-2 outline-none">
                            <button id="add-owner-btn" class="bg-blue-600 text-white px-6 rounded-xl font-bold">Simpan</button>
                        </div>
                    </div>
                    <div class="glass-card rounded-2xl overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50"><tr><th class="px-4 py-3">Nama</th><th class="px-4 py-3">Saldo</th><th class="px-4 py-3 text-center">Aksi</th></tr></thead>
                            <tbody id="owner-list-table" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2rhK8et5UvZ5IEKRy21qjk3gRhc9-FUU",
            authDomain: "finsync-family.firebaseapp.com",
            projectId: "finsync-family",
            storageBucket: "finsync-family.firebasestorage.app",
            messagingSenderId: "363860293467",
            appId: "1:363860293467:web:81947477674fdeaa514c7e",
            databaseURL: "https://finsync-family-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let owners = [];
        let transactions = [];
        let currentType = 'in';

        // --- TOGGLE MENU MOBILE ---
        window.toggleMenu = () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('closed');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        };

        window.navAction = (id) => {
            showSection(id);
            if (window.innerWidth < 768) toggleMenu(); // Tutup menu setelah klik di mobile
        };

        window.showSection = (id) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        };

        const formatIDR = (n) => "Rp " + new Intl.NumberFormat('id-ID').format(n);

        window.setType = (t) => {
            currentType = t;
            document.getElementById('btn-in').className = t === 'in' ? "py-2 rounded-xl bg-blue-600 text-white font-bold text-sm" : "py-2 rounded-xl bg-slate-100 text-slate-400 border font-bold text-sm";
            document.getElementById('btn-out').className = t === 'out' ? "py-2 rounded-xl bg-red-600 text-white font-bold text-sm" : "py-2 rounded-xl bg-slate-100 text-slate-400 border font-bold text-sm";
        };

        const render = () => {
            document.getElementById('balance-cards').innerHTML = owners.map(o => `
                <div class="glass-card p-5 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">${o.name}</p>
                    <h3 class="text-lg font-bold mt-1 text-slate-700">${formatIDR(o.balance)}</h3>
                </div>`).join('');

            document.getElementById('owner-select').innerHTML = owners.map(o => `<option value="${o.id}">${o.name}</option>`).join('');
            
            document.getElementById('owner-list-table').innerHTML = owners.map(o => `
                <tr class="bg-white">
                    <td class="px-4 py-3 font-bold text-slate-600">${o.name}</td>
                    <td class="px-4 py-3 text-blue-600 font-bold">${formatIDR(o.balance)}</td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="editOwner('${o.id}', '${o.name}')" class="text-blue-500 mr-3 text-xs font-bold">Edit</button>
                        <button onclick="deleteOwner('${o.id}')" class="text-red-400 text-xs font-bold">Hapus</button>
                    </td>
                </tr>`).join('');

            document.getElementById('full-history-logs').innerHTML = transactions.map((t) => `
                <tr class="bg-white">
                    <td class="px-4 py-3 text-slate-400 text-[10px]">${t.date}<br>${t.time}</td>
                    <td class="px-4 py-3 font-bold text-slate-600 text-xs">${t.ownerName}</td>
                    <td class="px-4 py-3 text-slate-500 text-xs">${t.desc}</td>
                    <td class="px-4 py-3 font-bold text-xs ${t.type === 'in' ? 'text-emerald-500' : 'text-red-500'}">
                        ${t.type === 'in' ? '+' : '-'} ${formatIDR(t.amount)}
                    </td>
                    <td class="px-4 py-3 text-center">
                        <button onclick="editTransaction('${t.id}')" class="text-blue-400 font-bold text-[10px] border border-blue-100 px-2 py-1 rounded">EDIT</button>
                    </td>
                </tr>`).join('');

            const total = owners.reduce((a, b) => a + (b.balance || 0), 0);
            document.getElementById('total-rekening-sidebar').innerText = formatIDR(total);
        };

        // SYNC DATA
        onValue(ref(db, 'finSync/owners'), (s) => {
            const data = s.val();
            owners = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
            render();
        });
        onValue(ref(db, 'finSync/transactions'), (s) => {
            const data = s.val();
            transactions = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })).reverse() : [];
            render();
        });

        // ACTIONS
        document.getElementById('add-owner-btn').onclick = () => {
            const name = document.getElementById('new-owner-name').value.trim();
            if(name) { push(ref(db, 'finSync/owners'), { name, balance: 0 }); document.getElementById('new-owner-name').value = ""; }
        };

        window.deleteOwner = (id) => { if(confirm('Hapus?')) remove(ref(db, `finSync/owners/${id}`)); };
        window.editOwner = (id, old) => { const n = prompt('Nama baru:', old); if(n) update(ref(db, `finSync/owners/${id}`), { name: n }); };

        document.getElementById('finance-form').onsubmit = (e) => {
            e.preventDefault();
            const ownerId = document.getElementById('owner-select').value;
            const amount = parseInt(document.getElementById('amount').value);
            const desc = document.getElementById('desc').value;
            if(!amount || !desc || !ownerId) return;

            const owner = owners.find(o => o.id === ownerId);
            const now = new Date();
            const tRef = push(ref(db, 'finSync/transactions'));
            set(tRef, {
                ownerId, ownerName: owner.name, amount, desc, type: currentType,
                date: now.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}),
                time: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            });
            update(ref(db, `finSync/owners/${ownerId}`), { balance: owner.balance + (currentType === 'in' ? amount : -amount) });
            e.target.reset();
            showSection('rekap');
        };

        window.editTransaction = (tId) => {
            const t = transactions.find(x => x.id === tId);
            const owner = owners.find(o => o.id === t.ownerId);
            update(ref(db, `finSync/owners/${t.ownerId}`), { balance: owner.balance + (t.type === 'in' ? -t.amount : t.amount) });
            document.getElementById('amount').value = t.amount;
            document.getElementById('desc').value = t.desc;
            document.getElementById('owner-select').value = t.ownerId;
            setType(t.type);
            remove(ref(db, `finSync/transactions/${tId}`));
            showSection('transaksi');
        };
    </script>
</body>
</html>
