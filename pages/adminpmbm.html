<script type="module">
    // 1. Import Modul Firebase SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Gunakan Firebase Config Anda
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "proyek-anda.firebaseapp.com",
        projectId: "proyek-anda",
        storageBucket: "proyek-anda.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:1234:web:abcd"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fungsi Ambil Data dari Firestore
    async function loadData() {
        const tableBody = document.getElementById('tableBody');
        const totalCounter = document.getElementById('totalPendaftar');
        
        try {
            const q = query(collection(db, "pendaftaran"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            
            tableBody.innerHTML = '';
            let nomor = 1;

            if (querySnapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-slate-400">Belum ada siswa yang mendaftar.</td></tr>`;
                totalCounter.textContent = "0";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;

                let tanggalDaftar = "-";
                if (data.createdAt) {
                    const dateObj = data.createdAt.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
                    tanggalDaftar = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                }

                const row = `
                    <tr class="hover:bg-slate-50/70 transition">
                        <td class="px-6 py-4 font-medium text-slate-500">${nomor++}</td>
                        <td class="px-6 py-4 font-semibold text-slate-800">${data.nama || '-'}</td>
                        <td class="px-6 py-4">
                            <div class="text-slate-700 font-medium">${data.nisn || '-'}</div>
                            <div class="text-xs text-slate-400">${data.asalSekolah || '-'}</div>
                        </td>
                        <td class="px-6 py-4 text-slate-600">
                            <a href="https://wa.me/${data.telepon}" target="_blank" class="text-indigo-600 hover:underline flex items-center gap-1">
                                <i class="fa-brands fa-whatsapp text-green-500"></i> ${data.telepon || '-'}
                            </a>
                        </td>
                        <td class="px-6 py-4 text-slate-500">${tanggalDaftar}</td>
                        <td class="px-6 py-4 text-center print:hidden">
                            <button onclick="hapusSiswa('${docId}')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 p-2 rounded-lg transition text-xs font-medium cursor-pointer" title="Hapus Data">
                                <i class="fa-regular fa-trash-can text-sm"></i> Hapus
                            </button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
            
            totalCounter.textContent = querySnapshot.size;

        } catch (error) {
            console.error("Gagal memuat data admin:", error);
            tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-rose-500 bg-rose-50/50">⚠️ Gagal memuat data: ${error.message}</td></tr>`;
        }
    }

    // Fungsi Hapus Data Terpilih
    window.hapusSiswa = async function(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data siswa ini secara permanen?")) {
            try {
                await deleteDoc(doc(db, "pendaftaran", id));
                alert("Data berhasil dihapus!");
                loadData();
            } catch (err) {
                alert("Gagal menghapus: " + err.message);
            }
        }
    }

    // Daftarkan ke objek window
    window.loadData = loadData;

    // Jalankan otomatis saat halaman dibuka
    window.onload = loadData;
</script>
