<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sipelita - Chat</title>
    
    <!-- Memanggil CSS dari folder css/ (naik 1 level dengan ../) -->
    <link rel="stylesheet" href="../css/chat.css">
    
    <!-- Jika Anda ingin menggunakan style global dari style.css, hapus komentar baris di bawah ini -->
    <!-- <link rel="stylesheet" href="../css/style.css"> -->

    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Daftar Pengguna -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Sipelita Chat</h2>
                <span class="my-status" id="myStatusText">Menghubungkan...</span>
            </div>
            <div class="user-list" id="userList">
                <div class="loading">Memuat pengguna...</div>
            </div>
        </aside>

        <!-- Area Chat Utama -->
        <main class="chat-area">
            <div class="chat-placeholder" id="chatPlaceholder">
                <i class="fas fa-comments fa-3x"></i>
                <p>Pilih pengguna untuk memulai obrolan</p>
            </div>

            <div class="chat-window" id="chatWindow" style="display: none;">
                <!-- Header Chat -->
                <div class="chat-header">
                    <div class="chat-user-info">
                        <div class="avatar" id="chatAvatar">U</div>
                        <div>
                            <h3 id="chatUserName">Nama User</h3>
                            <span class="chat-status" id="chatUserStatus">Offline</span>
                        </div>
                    </div>
                </div>

                <!-- Area Pesan -->
                <div class="messages-container" id="messagesContainer">
                    <!-- Pesan akan di-generate oleh JS -->
                </div>

                <!-- Input Pesan -->
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Memanggil JS dari folder js/ (naik 1 level dengan ../) -->
    <!-- type="module" wajib digunakan karena kita menggunakan ES6 Import untuk Firebase -->
    <script type="module" src="../js/chat.js"></script>
</body>
</html>
