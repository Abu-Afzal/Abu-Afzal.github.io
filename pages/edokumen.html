<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Dokumen - SIPELITA</title>
  <link rel="icon" type="image/png" href="../assets/images/icon-app.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-header { background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%); color: white; padding: 40px 24px; border-radius: 14px; text-align: center; margin-bottom: 30px; }
    .page-header h1 { font-size: 2rem; margin-bottom: 10px; }
    .back-btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 8px; transition: background 0.3s; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .content { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .upload-box { background: #e3f2fd; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
    .upload-box h3 { margin-top: 0; color: #1565c0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    
    /* Style Tambahan untuk Pilihan Metode */
    .radio-group { display: flex; gap: 20px; margin-bottom: 15px; font-weight: 600; color: #333; }
    .radio-option { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .radio-option input { width: auto; cursor: pointer; }
    
    .btn-upload { background: #1e88e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
    .btn-upload:hover { background: #1565c0; }
    .btn-upload:disabled { background: #90caf9; cursor: not-allowed; }
    .dokumen-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .dokumen-item { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 4px solid #1e88e5; transition: transform 0.2s; }
    .dokumen-item:hover { transform: translateX(4px); }
    .dokumen-item h4 { margin: 0 0 5px; font-size: 1rem; }
    .dokumen-item .meta { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
    .dokumen-item .actions { display: flex; gap: 10px; }
    .dokumen-item a, .dokumen-item button { text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .btn-download { background: #e3f2fd; color: #1565c0; }
    .btn-delete { background: #ffebee; color: #c62828; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
    .error.show { display: block; }
    .btn-view { background: #e8f5e9; color: #2e7d32; }
    .btn-view:hover { background: #c8e6c9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
      <h1>E-Dokumen Madrasah</h1>
      <p>Arsip digital & berkas administratif terpusat</p>
      <a href="../index.html" class="back-btn">← Kembali ke Dashboard</a>
    </div>
    
    <div class="content">
      <div class="upload-box">
        <h3>📤 Upload Dokumen Baru</h3>
        <div class="form-row">
          <select id="kategori" required>
            <option value="">Pilih Kategori</option>
            <option value="SK & Kepegawaian">SK & Kepegawaian</option>
            <option value="Kurikulum & RPP">Kurikulum & RPP</option>
            <option value="Akreditasi">Akreditasi</option>
            <option value="Keuangan">Keuangan</option>
            <option value="Peraturan & Tata Tertib">Peraturan & Tata Tertib</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <input type="text" id="namaDokumen" placeholder="Nama Dokumen (contoh: SK Kepala Sekolah 2026)" required>
        </div>
        
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="sumberDokumen" value="lokal" checked> 📱 Berkas Perangkat (Max 1MB)
          </label>
          <label class="radio-option">
            <input type="radio" name="sumberDokumen" value="link"> 🔗 Tautan Google Drive
          </label>
        </div>
        
        <div id="inputLokalContainer">
          <p style="margin-bottom: 8px; font-size: 0.85rem; color: #c62828; font-weight: 600;">⚠️ Maksimal Ukuran File: 1 MB</p>
          <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.jpg,.png,.xls,.xlsx">
        </div>

        <div id="inputLinkContainer" style="display: none; margin-bottom: 15px;">
          <input type="url" id="linkInput" placeholder="Tempel/Paste Link Google Drive di sini (Pastikan aksesnya 'Siapa saja yang memiliki link')">
        </div>

        <div id="errorMsg" class="error"></div>
        <button id="btnUpload" class="btn-upload">Simpan Dokumen</button>
      </div>

      <h3 style="margin-bottom: 15px; color: #1e88e5;">📚 Dokumen Tersimpan</h3>
      <div id="loadingState" class="loading">⏳ Memuat dokumen...</div>
      <div id="dokumenContainer" class="dokumen-list"></div>
    </div>
  </div>
  
  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // DOM Elements
    const btnUpload = document.getElementById('btnUpload');
    const fileInput = document.getElementById('fileInput');
    const linkInput = document.getElementById('linkInput');
    const kategori = document.getElementById('kategori');
    const namaDokumen = document.getElementById('namaDokumen');
    const errorMsg = document.getElementById('errorMsg');
    const container = document.getElementById('dokumenContainer');
    const loadingState = document.getElementById('loadingState');
    
    const radioLokal = document.querySelector('input[value="lokal"]');
    const radioLink = document.querySelector('input[value="link"]');
    const inputLokalContainer = document.getElementById('inputLokalContainer');
    const inputLinkContainer = document.getElementById('inputLinkContainer');

    // Toggle Tampilan Form Berdasarkan Pilihan Radio Button
    radioLokal.addEventListener('change', () => {
      inputLokalContainer.style.display = 'block';
      inputLinkContainer.style.display = 'none';
      errorMsg.classList.remove('show');
    });
    
    radioLink.addEventListener('change', () => {
      inputLokalContainer.style.display = 'none';
      inputLinkContainer.style.display = 'block';
      errorMsg.classList.remove('show');
    });

    // Tampilkan daftar dokumen dari Firestore
    async function loadDokumen() {
      loadingState.style.display = 'block';
      container.innerHTML = '';
      
      try {
        const querySnapshot = await getDocs(collection(db, "dokumen"));
        loadingState.style.display = 'none';
        
        if (querySnapshot.empty) {
          container.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">📭 Belum ada dokumen. Silakan upload terlebih dahulu.</p>';
          return;
        }
        
        const docs = [];
        querySnapshot.forEach((doc) => {
          docs.push({ id: doc.id, ...doc.data() });
        });
        
        docs.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
        
        docs.forEach(d => {
          const sizeText = d.size === 0 ? "🔗 Tautan Cloud" : `${(d.size / (1024*1024)).toFixed(2)} MB`;
          const date = new Date(d.uploadedAt).toLocaleDateString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric'
          });
          
          // Deteksi apakah data berupa Link Google Drive atau Base64 Lokal
          const isLink = d.url.startsWith('http');
          
          container.innerHTML += `
            <div class="dokumen-item">
              <h4>${d.nama}</h4>
              <div class="meta">📂 ${d.kategori} •  ${date} • ${sizeText}</div>
              <div class="actions">
                <button onclick="lihatDokumen('${d.url}')" class="btn-view">🖥️ Lihat</button>
                <a href="${d.url}" ${isLink ? 'target="_blank"' : `download="${d.fileName}"`} class="btn-download">${isLink ? '🔗 Buka Link' : '⬇️ Download'}</a>
                <button class="btn-delete" onclick="hapusDokumen('${d.id}')">🗑️ Hapus</button>
              </div>
            </div>
          `;
        });
      } catch (err) {
        loadingState.style.display = 'none';
        errorMsg.textContent = '❌ Gagal memuat: ' + err.message;
        errorMsg.classList.add('show');
      }
    }

    // Helper Base64
    const convertToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = (error) => reject(error);
    });

    // Handle Proses Simpan/Upload ke Firestore
    btnUpload.addEventListener('click', async () => {
      errorMsg.classList.remove('show');
      
      if (!kategori.value || !namaDokumen.value) {
        errorMsg.textContent = '⚠️ Lengkapi Kategori dan Nama Dokumen!';
        errorMsg.classList.add('show');
        return;
      }
      
      let finalUrl = '';
      let finalFileName = '';
      let finalSize = 0;
      
      const mode = document.querySelector('input[name="sumberDokumen"]:checked').value;
      
      if (mode === 'lokal') {
        // JIKA MENGGUNAKAN FILE LOKAL
        if (!fileInput.files[0]) {
          errorMsg.textContent = '⚠️ Silakan pilih file perangkat Anda terlebih dahulu!';
          errorMsg.classList.add('show');
          return;
        }
        const file = fileInput.files[0];
        if (file.size > 1 * 1024 * 1024) { 
          errorMsg.textContent = '⚠️ Ukuran file perangkat maksimal 1MB.';
          errorMsg.classList.add('show');
          return;
        }
        finalUrl = await convertToBase64(file);
        finalFileName = file.name;
        finalFileSize = file.size;
        
      } else {
        // JIKA MENGGUNAKAN LINK GOOGLE DRIVE
        if (!linkInput.value.trim().startsWith('http')) {
          errorMsg.textContent = '⚠️ Silakan masukkan tautan URL Google Drive yang valid (Diawali http/https)!';
          errorMsg.classList.add('show');
          return;
        }
        finalUrl = linkInput.value.trim();
        finalFileName = 'Google Drive Link';
        finalSize = 0; // Tanda jika ini data link teks
      }
      
      btnUpload.disabled = true;
      btnUpload.textContent = '⏳ Menyimpan...';
      
      try {
        await addDoc(collection(db, "dokumen"), {
          nama: namaDokumen.value.trim(),
          kategori: kategori.value,
          url: finalUrl, 
          fileName: finalFileName,
          size: finalSize,
          uploadedAt: new Date().toISOString()
        });
        
        alert('✅ Dokumen Berhasil Tersimpan');
        fileInput.value = '';
        linkInput.value = '';
        namaDokumen.value = '';
        kategori.value = '';
        loadDokumen();
      } catch (err) {
        errorMsg.textContent = '❌ Gagal menyimpan: ' + err.message;
        errorMsg.classList.add('show');
      } finally {
        btnUpload.disabled = false;
        btnUpload.textContent = 'Simpan Dokumen';
      }
    });

    // Fungsi Hapus
    window.hapusDokumen = async (id) => {
      if (!confirm('Yakin ingin menghapus dokumen ini?')) return;
      try {
        await deleteDoc(doc(db, "dokumen", id));
        alert('✅ Dokumen berhasil dihapus');
        loadDokumen();
      } catch (err) {
        alert('❌ Gagal menghapus: ' + err.message);
      }
    };

    // Fungsi Lihat/Preview (Mendukung Tautan maupun Blob Lokal)
    window.lihatDokumen = (urlOrBase64) => {
      try {
        if (urlOrBase64.startsWith('http')) {
          // Jika data berupa Link, langsung buka tab baru ke Google Drive
          window.open(urlOrBase64, '_blank');
        } else {
          // Jika data berupa Base64 lokal, ubah ke Blob dulu baru buka
          const parts = urlOrBase64.split(';base64,');
          const contentType = parts[0].split(':')[1];
          const raw = window.atob(parts[1]);
          const rawLength = raw.length;
          const uInt8Array = new Uint8Array(rawLength);
          for (let i = 0; i < rawLength; ++i) {
            uInt8Array[i] = raw.charCodeAt(i);
          }
          const blob = new Blob([uInt8Array], { type: contentType });
          const blobUrl = URL.createObjectURL(blob);
          window.open(blobUrl, '_blank');
        }
      } catch (e) {
        alert('⚠️ Gagal memuat pratinjau: ' + e.message);
      }
    };

    loadDokumen();
  </script>
</body>
</html>
