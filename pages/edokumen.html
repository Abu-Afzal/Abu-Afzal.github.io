<script type="module">
  import { DokumenService } from '../js/dokumen-service.js';

  const btnUpload = document.getElementById('btnUpload');
  const fileInput = document.getElementById('fileInput');
  const kategori = document.getElementById('kategori');
  const namaDokumen = document.getElementById('namaDokumen');
  const errorMsg = document.getElementById('errorMsg');
  const container = document.getElementById('dokumenContainer');
  const loadingState = document.getElementById('loadingState');

  // Tampilkan daftar dokumen
  async function loadDokumen() {
    loadingState.style.display = 'block';
    container.innerHTML = '';
    
    try {
      const docs = await DokumenService.getDokumen();
      loadingState.style.display = 'none';
      
      if (docs.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">📭 Belum ada dokumen. Silakan upload terlebih dahulu.</p>';
        return;
      }
      
      docs.forEach(d => {
        const sizeMB = (d.size / (1024*1024)).toFixed(2);
        const date = new Date(d.uploadedAt).toLocaleDateString('id-ID', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
        
        container.innerHTML += `
          <div class="dokumen-item">
            <h4>${d.nama}</h4>
            <div class="meta">📂 ${d.kategori} • 📅 ${date} • ${sizeMB} MB</div>
            <div class="actions">
              <a href="${d.url}" target="_blank" class="btn-download">⬇️ Download</a>
              <button class="btn-delete" onclick="hapusDokumen('${d.id}', '${d.storagePath || ''}')">🗑️ Hapus</button>
            </div>
          </div>
        `;
      });
    } catch (err) {
      loadingState.style.display = 'none';
      errorMsg.textContent = '❌ Gagal memuat: ' + err.message;
      errorMsg.style.display = 'block';
      console.error('Load error:', err);
    }
  }

  // Handle Upload
  btnUpload.addEventListener('click', async () => {
    errorMsg.style.display = 'none';
    
    if (!kategori.value || !namaDokumen.value || !fileInput.files[0]) {
      errorMsg.textContent = '⚠️ Lengkapi semua field dan pilih file!';
      errorMsg.style.display = 'block';
      return;
    }
    
    const file = fileInput.files[0];
    const allowedTypes = ['application/pdf', 'application/msword', 
      'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      'image/jpeg', 'image/png', 'application/vnd.ms-excel',
      'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'];
    
    if (!allowedTypes.includes(file.type)) {
      errorMsg.textContent = '⚠️ Format file tidak didukung. Gunakan PDF, DOC, DOCX, JPG, PNG, atau XLS.';
      errorMsg.style.display = 'block';
      return;
    }
    
    if (file.size > 10 * 1024 * 1024) { // 10MB limit
      errorMsg.textContent = '⚠️ Ukuran file maksimal 10MB.';
      errorMsg.style.display = 'block';
      return;
    }
    
    btnUpload.disabled = true;
    btnUpload.textContent = '⏳ Mengupload...';
    
    try {
      await DokumenService.uploadDokumen(file, kategori.value, namaDokumen.value);
      alert('✅ Dokumen berhasil diupload!');
      
      // Reset form
      fileInput.value = '';
      namaDokumen.value = '';
      kategori.value = '';
      
      // Reload daftar
      loadDokumen();
    } catch (err) {
      // Handle error spesifik
      if (err.message.includes('permission-denied') || err.message.includes('403')) {
        errorMsg.textContent = '❌ Tidak diizinkan. Cek Firebase Database & Storage Rules.';
      } else if (err.message.includes('CORS')) {
        errorMsg.textContent = '❌ CORS error. Hubungi admin untuk setup CORS policy.';
      } else {
        errorMsg.textContent = '❌ Upload gagal: ' + err.message;
      }
      errorMsg.style.display = 'block';
      console.error('Upload error:', err);
    } finally {
      btnUpload.disabled = false;
      btnUpload.textContent = 'Upload Dokumen';
    }
  });

  // Fungsi hapus (untuk admin)
  window.hapusDokumen = async (id, storagePath) => {
    if (!confirm('Yakin ingin menghapus dokumen ini?')) return;
    
    try {
      await DokumenService.hapusDokumen(id, storagePath);
      alert('✅ Dokumen berhasil dihapus');
      loadDokumen();
    } catch (err) {
      alert('❌ Gagal menghapus: ' + err.message);
      console.error('Delete error:', err);
    }
  };

  // Load dokumen saat halaman dibuka
  loadDokumen();
</script>
