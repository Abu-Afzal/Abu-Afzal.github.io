<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB24GCKSTPGlN9HG9E6uhCECVa4ibCpKEA",
    authDomain: "sipelita-digital.firebaseapp.com",
    databaseURL: "https://sipelita-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sipelita-digital",
    storageBucket: "sipelita-digital.firebasestorage.app",
    messagingSenderId: "787840817745",
    appId: "1:787840817745:web:e6b5237cfbb5e51be93670",
    measurementId: "G-1D5DWJV54E"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  const btnUpload = document.getElementById('btnUpload');
  const fileInput = document.getElementById('fileInput');
  const kategori = document.getElementById('kategori');
  const namaDokumen = document.getElementById('namaDokumen');
  const errorMsg = document.getElementById('errorMsg');
  const container = document.getElementById('dokumenContainer');
  const loadingState = document.getElementById('loadingState');

  // Load dokumen
  async function loadDokumen() {
    loadingState.style.display = 'block';
    container.innerHTML = '';
    
    try {
      const snapshot = await get(ref(db, 'dokumen'));
      loadingState.style.display = 'none';
      
      if (!snapshot.exists()) {
        container.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">📭 Belum ada dokumen</p>';
        return;
      }
      
      const data = snapshot.val();
      const docs = Object.entries(data)
        .map(([id, doc]) => ({ id, ...doc }))
        .sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
      
      docs.forEach(d => {
        const sizeMB = (d.size / (1024*1024)).toFixed(2);
        const date = new Date(d.uploadedAt).toLocaleDateString('id-ID');
        
        container.innerHTML += `
          <div class="dokumen-item">
            <h4>${d.nama}</h4>
            <div class="meta">📂 ${d.kategori} • 📅 ${date} • ${sizeMB} MB</div>
            <div class="actions">
              <a href="${d.url}" target="_blank" class="btn-download">⬇️ Download</a>
            </div>
          </div>
        `;
      });
    } catch (err) {
      loadingState.style.display = 'none';
      console.error('Load error:', err);
      errorMsg.textContent = 'Gagal load: ' + err.message;
      errorMsg.style.display = 'block';
    }
  }

  // Upload handler - VERSI SEDERHANA
  btnUpload.addEventListener('click', async () => {
    errorMsg.style.display = 'none';
    
    if (!kategori.value || !namaDokumen.value || !fileInput.files[0]) {
      errorMsg.textContent = 'Lengkapi semua field!';
      errorMsg.style.display = 'block';
      return;
    }
    
    const file = fileInput.files[0];
    btnUpload.disabled = true;
    btnUpload.textContent = '⏳ Uploading...';
    
    try {
      // 1. Upload file ke Storage
      const timestamp = Date.now();
      const fileName = `${timestamp}_${file.name.replace(/\s/g, '_')}`;
      const fileReference = storageRef(storage, `dokumen/${fileName}`);
      
      // Gunakan uploadBytes (bukan uploadBytesResumable) untuk menghindari CORS issue
      await uploadBytes(fileReference, file);
      
      // 2. Get download URL
      const downloadURL = await getDownloadURL(fileReference);
      
      // 3. Simpan ke Realtime Database
      const newDocRef = push(ref(db, 'dokumen'));
      await set(newDocRef, {
        nama: namaDokumen.value.trim(),
        kategori: kategori.value,
        url: downloadURL,
        fileName: file.name,
        size: file.size,
        uploadedAt: new Date().toISOString(),
        storagePath: `dokumen/${fileName}`
      });
      
      alert('✅ Upload berhasil!');
      
      // Reset form
      fileInput.value = '';
      namaDokumen.value = '';
      kategori.value = '';
      
      // Reload list
      loadDokumen();
      
    } catch (error) {
      console.error('Upload error:', error);
      
      let message = error.message;
      if (error.code === 'storage/unauthorized') {
        message = 'Tidak diizinkan. Cek Storage Rules di Firebase Console';
      } else if (error.message.includes('CORS')) {
        message = 'CORS error. Perlu setup CORS dengan gsutil';
      }
      
      errorMsg.textContent = '❌ Upload gagal: ' + message;
      errorMsg.style.display = 'block';
    } finally {
      btnUpload.disabled = false;
      btnUpload.textContent = 'Upload Dokumen';
    }
  });

  // Load awal
  loadDokumen();
</script>
