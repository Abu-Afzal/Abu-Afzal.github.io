<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Dokumen - SIPELITA</title>
  <link rel="icon" type="image/png" href="../assets/images/icon-app.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-header { background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%); color: white; padding: 40px 24px; border-radius: 14px; text-align: center; margin-bottom: 30px; }
    .page-header h1 { font-size: 2rem; margin-bottom: 10px; }
    .back-btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 8px; transition: background 0.3s; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .content { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .upload-box { background: #e3f2fd; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
    .upload-box h3 { margin-top: 0; color: #1565c0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .btn-upload { background: #1e88e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
    .btn-upload:hover { background: #1565c0; }
    .btn-upload:disabled { background: #90caf9; cursor: not-allowed; }
    .dokumen-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
    .dokumen-item { background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 4px solid #1e88e5; transition: transform 0.2s; }
    .dokumen-item:hover { transform: translateX(4px); }
    .dokumen-item h4 { margin: 0 0 5px; font-size: 1rem; }
    .dokumen-item .meta { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
    .dokumen-item .actions { display: flex; gap: 10px; }
    .dokumen-item a, .dokumen-item button { text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; border: none; cursor: pointer; }
    .btn-download { background: #e3f2fd; color: #1565c0; }
    .btn-delete { background: #ffebee; color: #c62828; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div style="font-size: 3rem; margin-bottom: 10px;">📁</div>
      <h1>E-Dokumen Madrasah</h1>
      <p>Arsip digital & berkas administratif terpusat</p>
      <a href="../index.html" class="back-btn">← Kembali ke Dashboard</a>
    </div>
    
    <div class="content">
      <!-- Debug Info (Opsional) -->
      <div id="debugInfo" style="display:none; background:#fff3cd; padding:10px; border-radius:8px; margin-bottom:15px; font-size:0.9rem;"></div>

      <!-- Form Upload -->
      <div class="upload-box">
        <h3>📤 Upload Dokumen Baru</h3>
        <div class="form-row">
          <select id="kategori" required>
            <option value="">Pilih Kategori</option>
            <option value="SK & Kepegawaian">SK & Kepegawaian</option>
            <option value="Kurikulum & RPP">Kurikulum & RPP</option>
            <option value="Akreditasi">Akreditasi</option>
            <option value="Keuangan">Keuangan</option>
            <option value="Peraturan & Tata Tertib">Peraturan & Tata Tertib</option>
            <option value="Lainnya">Lainnya</option>
          </select>
          <input type="text" id="namaDokumen" placeholder="Nama Dokumen (contoh: SK Kepala Sekolah 2026)" required>
        </div>
        
        <p style="margin-bottom: 8px; font-size: 0.85rem; color: #c62828; font-weight: 600;">⚠️ Maksimal Ukuran File: 1 MB</p>
        
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.jpg,.png,.xls,.xlsx" required>
        <div id="errorMsg" class="error"></div>
        <button id="btnUpload" class="btn-upload">Upload Dokumen</button>

        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.jpg,.png,.xls,.xlsx" required>
        <button id="btnGoogleDrive" type="button" style="background: #0f9d58; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; width: 100%;">
          🤖 Pilih File dari Google Drive
        </button>

        <div id="errorMsg" class="error"></div>
        <button id="btnUpload" class="btn-upload">Upload Dokumen</button>
      </div>
      <!-- Daftar Dokumen -->
      <h3 style="margin-bottom: 15px; color: #1e88e5;">📚 Dokumen Tersimpan</h3>
      <div id="loadingState" class="loading">⏳ Memuat dokumen...</div>
      <div id="dokumenContainer" class="dokumen-list"></div>
    </div>
  </div>
  
  <script type="module">
    // ✅ IMPORT 'db' yang sekarang sudah menjadi Firestore dari config terpisah
    import { db } from '../js/firebase-config.js';
    
    // Import fungsi resmi yang dibutuhkan khusus oleh Cloud Firestore
    import { collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // DOM Elements
    const btnUpload = document.getElementById('btnUpload');
    const fileInput = document.getElementById('fileInput');
    const kategori = document.getElementById('kategori');
    const namaDokumen = document.getElementById('namaDokumen');
    const errorMsg = document.getElementById('errorMsg');
    const container = document.getElementById('dokumenContainer');
    const loadingState = document.getElementById('loadingState');

    // Tampilkan daftar dokumen dari Firestore
    async function loadDokumen() {
      loadingState.style.display = 'block';
      container.innerHTML = '';
      
      try {
        // Mengambil snapshot dari koleksi bernama 'dokumen' di Firestore
        const querySnapshot = await getDocs(collection(db, "dokumen"));
        loadingState.style.display = 'none';
        
        if (querySnapshot.empty) {
          container.innerHTML = '<p style="text-align:center; color:#666; padding:40px;">📭 Belum ada dokumen. Silakan upload terlebih dahulu.</p>';
          return;
        }
        
        // Memetakan data dokumen Firestore ke dalam Array
        const docs = [];
        querySnapshot.forEach((doc) => {
          docs.push({ id: doc.id, ...doc.data() });
        });
        
        // Urutkan berdasarkan tanggal unggah terbaru
        docs.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));
        
        // Render data ke HTML
        docs.forEach(d => {
          const sizeMB = (d.size / (1024*1024)).toFixed(2);
          const date = new Date(d.uploadedAt).toLocaleDateString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric'
          });
          
          container.innerHTML += `
            <div class="dokumen-item">
              <h4>${d.nama}</h4>
              <div class="meta">📂 ${d.kategori} •  ${date} • ${sizeMB} MB</div>
              <div class="actions">
                <a href="${d.url}" download="${d.fileName}" class="btn-download">⬇️ Download</a>
                <button class="btn-delete" onclick="hapusDokumen('${d.id}')">🗑️ Hapus</button>
              </div>
            </div>
          `;
        });
      } catch (err) {
        loadingState.style.display = 'none';
        errorMsg.textContent = '❌ Gagal memuat: ' + err.message;
        errorMsg.classList.add('show');
        console.error('Load error:', err);
      }
    }

    // Helper untuk mengubah file menjadi Base64 string
    const convertToBase64 = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = (error) => reject(error);
    });

    // Handle Proses Upload ke Firestore
    btnUpload.addEventListener('click', async () => {
      errorMsg.classList.remove('show');
      
      if (!kategori.value || !namaDokumen.value || !fileInput.files[0]) {
        errorMsg.textContent = '⚠️ Lengkapi semua field dan pilih file!';
        errorMsg.classList.add('show');
        return;
      }
      
      const file = fileInput.files[0];
      
      // PENTING: Firestore membatasi ukuran teks dokumen maksimal 1MB
      if (file.size > 1 * 1024 * 1024) { 
        errorMsg.textContent = '⚠️ Batasan Metode Firestore Base64: Ukuran file maksimal adalah 1MB agar tidak ditolak Firestore.';
        errorMsg.classList.add('show');
        return;
      }
      
      btnUpload.disabled = true;
      btnUpload.textContent = '⏳ Mengupload...';
      
      try {
        // 1. Konversi file fisik menjadi string teks Base64
        const base64String = await convertToBase64(file);
        
        // 2. Simpan sebagai data dokumen baru di koleksi 'dokumen' Firestore
        await addDoc(collection(db, "dokumen"), {
          nama: namaDokumen.value.trim(),
          kategori: kategori.value,
          url: base64String, // String file disimpan di sini
          fileName: file.name,
          size: file.size,
          uploadedAt: new Date().toISOString()
        });
        
        alert('✅ Dokumen berhasil diupload ke Cloud Firestore!');
        
        // Reset formulir input
        fileInput.value = '';
        namaDokumen.value = '';
        kategori.value = '';
        
        // Memuat ulang daftar dokumen
        loadDokumen();
      } catch (err) {
        errorMsg.textContent = '❌ Upload gagal: ' + err.message;
        errorMsg.classList.add('show');
        console.error('Upload error:', err);
      } finally {
        btnUpload.disabled = false;
        btnUpload.textContent = 'Upload Dokumen';
      }
    });

    // Fungsi Hapus Dokumen Firestore (Global)
    window.hapusDokumen = async (id) => {
      if (!confirm('Yakin ingin menghapus dokumen ini?')) return;
      
      try {
        // Eksekusi penghapusan berdasarkan ID Dokumen unik milik Firestore
        await deleteDoc(doc(db, "dokumen", id));
        alert('✅ Dokumen berhasil dihapus dari Firestore');
        loadDokumen();
      } catch (err) {
        alert('❌ Gagal menghapus: ' + err.message);
        console.error('Delete error:', err);
      }
    };

    // Eksekusi fungsi load data saat halaman pertama kali dibuka
    loadDokumen();
  </script>
</body>
</html>
