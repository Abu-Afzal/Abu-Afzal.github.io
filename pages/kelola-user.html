<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Pengguna - SIPELITA</title>
  <link rel="icon" type="image/png" href="../assets/images/icon-app.png">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page-header { background: linear-gradient(135deg, #1565c0 0%, #1e88e5 100%); color: white; padding: 40px 24px; border-radius: 14px; text-align: center; margin-bottom: 30px; }
    .back-btn { display: inline-block; margin-top: 20px; padding: 10px 24px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 8px; transition: background 0.3s; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .content { background: white; padding: 30px; border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
    .form-box { background: #e3f2fd; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
    .form-box h3 { margin-top: 0; color: #0d47a1; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    .btn-save { background: #1e88e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; font-size: 1rem; }
    .btn-save:hover { background: #1565c0; }
    
    .user-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .user-table th, .user-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    .user-table th { background-color: #f5f5f5; color: #333; }
    .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    .role-admin { background: #ffebee; color: #c62828; }
    .role-guru { background: #e8f5e9; color: #2e7d32; }
    .role-staf { background: #fff3e0; color: #ef6c00; }
    
    .btn-delete { background: #ffebee; color: #c62828; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-delete:hover { background: #ffcdd2; }
    .error { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div style="font-size: 3rem; margin-bottom: 10px;">👥</div>
      <h1>Kelola Akun Pengguna</h1>
      <p>Registrasi dan pengaturan hak akses Guru & Staf MAN Bantaeng</p>
      <a href="../index.html" class="back-btn">← Kembali ke Dashboard</a>
    </div>

    <div class="content">
      <div class="form-box">
        <h3>➕ Daftarkan Pengguna Baru</h3>
        <div id="errorMsg" class="error"></div>
        
        <div class="form-grid">
          <div>
            <label style="font-weight:600;">Nama Lengkap</label>
            <input type="text" id="userNama" placeholder="Nama Lengkap & Gelar" required>
          </div>
          <div>
            <label style="font-weight:600;">Email Madrasah</label>
            <input type="email" id="userEmail" placeholder="contoh@manbantaeng.sch.id" required>
          </div>
          <div>
            <label style="font-weight:600;">Password Awal</label>
            <input type="text" id="userPassword" placeholder="Minimal 6 karakter" required>
          </div>
          <div>
            <label style="font-weight:600;">Hak Akses / Role</label>
            <select id="userRole" required>
              <option value="">-- Pilih Role --</option>
              <option value="Guru">👨‍🏫 Guru</option>
              <option value="Staf TU">💼 Staf TU</option>
              <option value="Admin">⚡ Admin Sistem</option>
            </select>
          </div>
        </div>
        <button id="btnSimpanUser" class="btn-save">Simpan Akun Pengguna</button>
      </div>

      <h3 style="color: #1565c0; margin-bottom: 15px;">Daftar Pengguna Aktif</h3>
      <div style="overflow-x: auto;">
        <table class="user-table">
          <thead>
            <tr>
              <th>Nama Pengguna</th>
              <th>Email</th>
              <th>Role</th>
              <th>Password Sistem</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tabelUserBody">
            <tr>
              <td colspan="5" style="text-align: center; color: #666;">⏳ Memuat data pengguna...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from '../js/firebase-config.js';
    import { collection, setDoc, doc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const btnSimpanUser = document.getElementById('btnSimpanUser');
    const userNama = document.getElementById('userNama');
    const userEmail = document.getElementById('userEmail');
    const userPassword = document.getElementById('userPassword');
    const userRole = document.getElementById('userRole');
    const errorMsg = document.getElementById('errorMsg');
    const tabelUserBody = document.getElementById('tabelUserBody');

    // Load semua user dari Firestore
    async function loadAllUsers() {
      tabelUserBody.innerHTML = '';
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        if (querySnapshot.empty) {
          tabelUserBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">📭 Belum ada data pengguna terdaftar.</td></tr>';
          return;
        }

        querySnapshot.forEach((doc) => {
          const u = doc.data();
          let roleClass = 'role-guru';
          if(u.role === 'Admin') roleClass = 'role-admin';
          if(u.role === 'Staf TU') roleClass = 'role-staf';

          tabelUserBody.innerHTML += `
            <tr>
              <td style="font-weight:600;">${u.nama}</td>
              <td>${u.email}</td>
              <td><span class="role-badge ${roleClass}">${u.role}</span></td>
              <td style="font-family: monospace; color:#666;">${u.password || '******'}</td>
              <td><button class="btn-delete" onclick="hapusUser('${u.email}')">🗑️ Hapus</button></td>
            </tr>
          `;
        });
      } catch (err) {
        tabelUserBody.innerHTML = `<tr><td colspan="5" style="color:red;">Gagal memuat: ${err.message}</td></tr>`;
      }
    }

    // Aksi Simpan Pengguna Baru
    btnSimpanUser.addEventListener('click', async () => {
      errorMsg.classList.remove('show');
      const emailVal = userEmail.value.trim().toLowerCase();
      const namaVal = userNama.value.trim();
      const passVal = userPassword.value.trim();
      const roleVal = userRole.value;

      if (!namaVal || !emailVal || !passVal || !roleVal) {
        errorMsg.textContent = '⚠️ Mohon lengkapi semua data kolom!';
        errorMsg.classList.add('show');
        return;
      }
      if (passVal.length < 6) {
        errorMsg.textContent = '⚠️ Password awal minimal harus 6 karakter!';
        errorMsg.classList.add('show');
        return;
      }

      btnSimpanUser.disabled = true;
      btnSimpanUser.textContent = '⏳ Menyimpan data...';

      try {
        // Simpan data user ke koleksi "users" dengan ID dokumen berupa Email-nya
        await setDoc(doc(db, "users", emailVal), {
          nama: namaVal,
          email: emailVal,
          password: passVal, // disimpan sementara agar admin tahu password awal user
          role: roleVal,
          createdAt: new Date().toISOString()
        });

        alert(`✅ Akun ${namaVal} berhasil disimpan ke sistem!`);
        userNama.value = '';
        userEmail.value = '';
        userPassword.value = '';
        userRole.value = '';
        loadAllUsers();
      } catch (err) {
        errorMsg.textContent = '❌ Gagal mendaftarkan user: ' + err.message;
        errorMsg.classList.add('show');
      } finally {
        btnSimpanUser.disabled = false;
        btnSimpanUser.textContent = 'Simpan Akun Pengguna';
      }
    });

    // Fungsi Global Hapus User
    window.hapusUser = async (email) => {
      if (!confirm(`Apakah Anda yakin ingin menghapus hak akses untuk ${email}?`)) return;
      try {
        await deleteDoc(doc(db, "users", email));
        alert('✅ Data akses berhasil dihapus');
        loadAllUsers();
      } catch (err) {
        alert('❌ Gagal menghapus: ' + err.message);
      }
    };

    loadAllUsers();
  </script>
</body>
</html>
