<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SICAN - Rekap Absensi & Pembiasaan</title>

<link rel="icon" type="image/png" href="../assets/images/sipelita-app.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
    color:#334155;
}

.header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:24px;
    text-align:center;
}

.header h1{
    margin-bottom:6px;
}

.container{
    max-width:1300px;
    margin:25px auto;
    padding:0 15px;
}

.card{
    background:white;
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.06);
}

.filter-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:14px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:5px;
}

label{
    font-size:.85rem;
    font-weight:600;
}

select,input{
    padding:10px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    outline:none;
}

select:focus,input:focus{
    border-color:#2563eb;
}

.btn-group{
    margin-top:18px;
    display:flex;
    gap:10px;
    justify-content:flex-end;
}

.btn{
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    color:white;
}

.btn-primary{
    background:#2563eb;
}

.btn-success{
    background:#16a34a;
}

.table-wrap{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:900px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
    text-align:left;
}

th{
    background:#f8fafc;
    color:#1e3a8a;
}

tr:hover{
    background:#fafafa;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:6px;
    font-size:.78rem;
    font-weight:700;
}

.badge-hadir{
    background:#dcfce7;
    color:#166534;
}

.badge-persen{
    background:#dbeafe;
    color:#1d4ed8;
}

.badge-jam{
    background:#fef3c7;
    color:#92400e;
}

.text-center{
    text-align:center;
}

.info{
    margin:10px 0 15px;
    color:#64748b;
    font-size:.9rem;
}

@media print{
    .filter-card,
    .btn-group,
    .header a{
        display:none !important;
    }

    body{
        background:white;
    }

    .card{
        box-shadow:none;
    }
}

</style>
</head>
<body>

<div class="header">
    <h1>📊 Rekap Absensi & Pembiasaan</h1>
    <p>Sistem Informasi Kehadiran Siswa Digital</p>

    <div style="margin-top:15px;">
        <a href="../index.html"
           style="color:white;text-decoration:none;border:1px solid rgba(255,255,255,.4);padding:8px 15px;border-radius:8px;">
           🏠 Dashboard
        </a>
    </div>
</div>

<div class="container">

    <!-- FILTER -->
    <div class="card filter-card">

        <div class="filter-grid">

            <div class="form-group">
                <label>Jenis Rekap</label>
                <select id="jenisData">
                    <option value="absensi">Absensi Kehadiran</option>
                    <option value="kegiatan">Kegiatan Pembiasaan</option>
                </select>
            </div>

            <div class="form-group" id="kegiatanGroup" style="display:none;">
                <label>Kegiatan</label>
                <select id="filterKegiatan">
                    <option value="SEMUA">Semua Kegiatan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Periode</label>
                <select id="periodeFilter">
                    <option value="bulanan">Bulanan</option>
                    <option value="pekanan">7 Hari Terakhir</option>
                    <option value="semester_ganjil">Semester Ganjil</option>
                    <option value="semester_genap">Semester Genap</option>
                    <option value="tahunan">Tahunan</option>
                </select>
            </div>

            <div class="form-group" id="bulanGroup">
                <label>Bulan</label>
                <select id="bulanFilter">
                    <option value="01">Januari</option>
                    <option value="02">Februari</option>
                    <option value="03">Maret</option>
                    <option value="04">April</option>
                    <option value="05">Mei</option>
                    <option value="06">Juni</option>
                    <option value="07">Juli</option>
                    <option value="08">Agustus</option>
                    <option value="09">September</option>
                    <option value="10">Oktober</option>
                    <option value="11">November</option>
                    <option value="12">Desember</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tahun</label>
                <select id="tahunFilter">
                    <option>2026</option>
                    <option>2027</option>
                </select>
            </div>

            <div class="form-group">
                <label>Filter Kelas</label>
                <select id="kelasFilter">
                    <option value="SEMUA">Semua Kelas</option>
                    <option value="X">Kelas X</option>
                    <option value="XI">Kelas XI</option>
                    <option value="XII">Kelas XII</option>
                </select>
            </div>

        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="btnProses">
                🔍 Tampilkan Rekap
            </button>

            <button class="btn btn-success" id="btnCetak">
                🖨️ Cetak
            </button>
        </div>

    </div>

    <!-- HASIL -->
    <div class="card">

        <h2 id="judulRekap">
            📋 Rekap Kehadiran
        </h2>

        <div class="info" id="infoTambahan">
            Menunggu data...
        </div>

        <div class="table-wrap">

            <table>

                <thead>
                    <tr>
                        <th>No</th>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                        <th>Kegiatan</th>
                        <th>Rentang Waktu</th>
                        <th>Total Hadir</th>
                        <th>Persentase</th>
                    </tr>
                </thead>

                <tbody id="rekapBody">
                    <tr>
                        <td colspan="8" class="text-center">
                            Klik "Tampilkan Rekap"
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

</div>

<script type="module">

import { auth, db } from "../js/firebase-config.js";

import {
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";


// ========================================
// PROTEKSI LOGIN
// ========================================

onAuthStateChanged(auth,(user)=>{
    if(!user){
        window.location.href='../login.html';
    }
});


// ========================================
// ELEMENT
// ========================================

const jenisData       = document.getElementById('jenisData');
const kegiatanGroup   = document.getElementById('kegiatanGroup');
const filterKegiatan  = document.getElementById('filterKegiatan');
const periodeFilter   = document.getElementById('periodeFilter');
const bulanGroup      = document.getElementById('bulanGroup');


// ========================================
// TOGGLE
// ========================================

jenisData.addEventListener('change',()=>{

    kegiatanGroup.style.display =
        jenisData.value === 'kegiatan'
        ? 'block'
        : 'none';

});

periodeFilter.addEventListener('change',()=>{

    bulanGroup.style.display =
        periodeFilter.value === 'bulanan'
        ? 'block'
        : 'none';

});


// ========================================
// LOAD DAFTAR KEGIATAN
// ========================================

async function loadDaftarKegiatan(){

    const snap = await getDocs(collection(db,'absensi_kegiatan'));

    const daftar = new Set();

    snap.forEach(doc=>{

        const data = doc.data();

        if(data.kegiatan){
            daftar.add(data.kegiatan);
        }

    });

    daftar.forEach(kegiatan=>{

        filterKegiatan.innerHTML += `
            <option value="${kegiatan}">
                ${kegiatan}
            </option>
        `;

    });

}

loadDaftarKegiatan();


// ========================================
// CETAK
// ========================================

document.getElementById('btnCetak')
.addEventListener('click',()=>{
    window.print();
});


// ========================================
// PROSES REKAP
// ========================================

document.getElementById('btnProses')
.addEventListener('click',muatRekap);

async function muatRekap(){

    const tbody = document.getElementById('rekapBody');

    tbody.innerHTML = `
        <tr>
            <td colspan="8" class="text-center">
                Memuat data...
            </td>
        </tr>
    `;

    try{

        const jenis = jenisData.value;

        const namaCollection =
            jenis === 'absensi'
            ? 'absensi'
            : 'absensi_kegiatan';

        const snapshot = await getDocs(
            collection(db,namaCollection)
        );

        if(snapshot.empty){

            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center">
                        Tidak ada data
                    </td>
                </tr>
            `;

            return;
        }

        const kelasFilter =
            document.getElementById('kelasFilter').value;

        const periode =
            document.getElementById('periodeFilter').value;

        const bulan =
            document.getElementById('bulanFilter').value;

        const tahun =
            document.getElementById('tahunFilter').value;

        const kegiatanDipilih =
            filterKegiatan.value;

        const hariEfektif = new Set();

        const mapSiswa = {};

        const hariIni = new Date();

        snapshot.forEach(docSnap=>{

            const data = docSnap.data();

            const tanggal = data.tanggal || '';
            const kelas   = data.siswa_kelas || '';
            const kegiatan = data.kegiatan || 'Absensi Masuk';

            if(!tanggal) return;

            // FILTER KELAS
            if(
                kelasFilter !== 'SEMUA' &&
                !kelas.startsWith(kelasFilter)
            ){
                return;
            }

            // FILTER KEGIATAN
            if(
                jenis === 'kegiatan' &&
                kegiatanDipilih !== 'SEMUA' &&
                kegiatan !== kegiatanDipilih
            ){
                return;
            }

            // FILTER WAKTU
            const pecah = tanggal.split('-');

            const thn = pecah[0];
            const bln = pecah[1];

            let lolos = false;

            if(periode === 'bulanan'){
                lolos = thn===tahun && bln===bulan;
            }

            else if(periode === 'tahunan'){
                lolos = thn===tahun;
            }

            else if(periode === 'semester_ganjil'){
                lolos =
                    thn===tahun &&
                    parseInt(bln)>=7 &&
                    parseInt(bln)<=12;
            }

            else if(periode === 'semester_genap'){
                lolos =
                    thn===tahun &&
                    parseInt(bln)>=1 &&
                    parseInt(bln)<=6;
            }

            else if(periode === 'pekanan'){

                const d = new Date(tanggal);

                const selisih =
                    (hariIni-d)/(1000*60*60*24);

                lolos = selisih <= 7 && selisih >= 0;
            }

            if(!lolos) return;

            hariEfektif.add(tanggal);

            const nis = data.siswa_nis;

            if(!mapSiswa[nis]){

                mapSiswa[nis] = {
                    nis,
                    nama:data.siswa_nama,
                    kelas,
                    kegiatan,
                    hadir:0,
                    jam:[]
                };

            }

            mapSiswa[nis].hadir++;

            if(data.jam){
                mapSiswa[nis].jam.push(data.jam);
            }

        });

        const daftar = Object.values(mapSiswa);

        tbody.innerHTML = '';

        if(daftar.length===0){

            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center">
                        Data tidak ditemukan
                    </td>
                </tr>
            `;

            return;
        }

        let no = 1;

        daftar.sort((a,b)=>
            a.nama.localeCompare(b.nama)
        );

        const totalEfektif =
            hariEfektif.size || 1;

        document.getElementById('infoTambahan')
        .textContent =
            `Hari efektif terdeteksi: ${totalEfektif} hari`;

        daftar.forEach(siswa=>{

            siswa.jam.sort();

            const awal =
                siswa.jam[0] || '-';

            const akhir =
                siswa.jam[siswa.jam.length-1] || '-';

            const rentang =
                awal===akhir
                ? awal
                : `${awal} s.d ${akhir}`;

            let persen =
                (siswa.hadir/totalEfektif)*100;

            if(persen>100) persen=100;

            tbody.innerHTML += `
                <tr>

                    <td>${no++}</td>

                    <td>
                        ${siswa.nis}
                    </td>

                    <td>
                        ${siswa.nama}
                    </td>

                    <td>
                        ${siswa.kelas}
                    </td>

                    <td>
                        ${siswa.kegiatan}
                    </td>

                    <td>
                        <span class="badge badge-jam">
                            ${rentang}
                        </span>
                    </td>

                    <td class="text-center">
                        <span class="badge badge-hadir">
                            ${siswa.hadir} Hari
                        </span>
                    </td>

                    <td class="text-center">
                        <span class="badge badge-persen">
                            ${persen.toFixed(1)}%
                        </span>
                    </td>

                </tr>
            `;

        });

    }catch(err){

        console.error(err);

        document.getElementById('rekapBody').innerHTML = `
            <tr>
                <td colspan="8" class="text-center">
                    Gagal memuat data:
                    ${err.message}
                </td>
            </tr>
        `;

    }

}

</script>

</body>
</html>
