<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAN - Scan Absensi</title>
    <link rel="icon" type="image/png" href="../assets/images/sipelita-app.png">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 0.9rem; }

        /* ── TOMBOL HEADER ── */
        .header-actions {
            display: inline-flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-header {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 7px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: inherit;
            border: 1.5px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            line-height: 1;
        }
        /* Biru — Kembali */
        .btn-back {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-color: rgba(255,255,255,0.4);
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.7);
            transform: translateY(-1px);
        }
        /* Merah — Logout */
        .btn-logout {
            background: rgba(239,68,68,0.18);
            color: #fecaca;
            border-color: rgba(239,68,68,0.45);
        }
        .btn-logout:hover {
            background: rgba(239,68,68,0.38);
            border-color: rgba(239,68,68,0.75);
            color: #fff;
            transform: translateY(-1px);
        }

        /* ── LAYOUT ── */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }

        .scanner-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .camera-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .select-camera {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.9rem;
            background: #fff;
            outline: none;
            min-width: 200px;
        }
        .btn-camera {
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-camera:hover { background: #0d47a1; }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 10px;
            overflow: hidden;
            background: #fafafa;
            min-height: 300px;
            border: 2px dashed #ddd;
        }

        .status-box {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
            display: none;
        }
        .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .status-warning { background: #fff3e0; color: #e65100; border: 1px solid #ff9800; }
        .status-error   { background: #ffebee; color: #c62828; border: 1px solid #f44336; }

        .log-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .log-box h3 { margin-bottom: 15px; color: #0d47a1; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #0d47a1; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📷 SICAN - Scan Absensi</h1>
        <p id="userInfo">Scan QR Code Kartu Pelajar untuk Absensi Otomatis</p>
        <div class="header-actions">
            <a href="../index.html" class="btn-header btn-back">🏠 Kembali</a>
            <button id="btnLogout" class="btn-header btn-logout">🚪 Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="scanner-box">
            <div class="camera-controls">
                <select id="cameraSelect" class="select-camera">
                    <option value="environment">Kamera Belakang (Default)</option>
                    <option value="user">Kamera Depan (Selfie)</option>
                </select>
                <button id="btnToggleCamera" class="btn-camera">Ganti Kamera</button>
            </div>
            <div id="reader">
                <p style="padding: 50px; color: #999;">⏳ Mengaktifkan kamera...</p>
            </div>
            <div id="statusBox" class="status-box"></div>
        </div>

        <div class="log-box">
            <h3>📋 Riwayat Absensi Hari Ini</h3>
            <div id="loadingLog" style="text-align:center; padding:10px; color:#666;">Memuat data...</div>
            <table id="logTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB24GCKSTPGlN9HG9E6uhCECVa4ibCpKEA",
            authDomain: "sipelita-digital.firebaseapp.com",
            databaseURL: "https://sipelita-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sipelita-digital",
            storageBucket: "sipelita-digital.firebasestorage.app",
            messagingSenderId: "787840817745",
            appId: "1:787840817745:web:e6b5237cfbb5e51be93670",
            measurementId: "G-1D5DWJV54E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let html5QrCode = null;
        let isProcessingScan = false;
        let currentFacingMode = "environment";

        // ✅ CHECK LOGIN
        function checkLoginAndInit() {
            const storedUser = localStorage.getItem('sipelita_user');
            if (storedUser) {
                try {
                    currentUser = JSON.parse(storedUser);
                    console.log("✅ Login dari localStorage:", currentUser.email);
                    initPage();
                    return;
                } catch (e) {
                    console.warn("⚠️ Data localStorage rusak");
                    localStorage.removeItem('sipelita_user');
                }
            }

            console.log("⏳ Cek Firebase Auth...");
            const authTimeout = setTimeout(() => {
                window.location.href = '../home.html';
            }, 5000);

            onAuthStateChanged(auth, (user) => {
                clearTimeout(authTimeout);
                if (user) {
                    currentUser = { uid: user.uid, email: user.email, nama: user.email, role: 'user' };
                    localStorage.setItem('sipelita_user', JSON.stringify(currentUser));
                    console.log("✅ Login dari Firebase:", user.email);
                    initPage();
                } else {
                    window.location.href = '../home.html';
                }
            });
        }

        function initPage() {
            if (currentUser) {
                document.getElementById('userInfo').textContent = `Login: ${currentUser.nama || currentUser.email}`;
            }
            loadTodayLog();
            setTimeout(() => { initScanner(currentFacingMode); }, 500);
        }

        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('Yakin ingin keluar dari SICAN?')) {
                localStorage.removeItem('sipelita_user');
                await signOut(auth).catch(() => {});
                window.location.href = '../home.html';
            }
        });

        document.getElementById('btnToggleCamera').addEventListener('click', async () => {
            currentFacingMode = document.getElementById('cameraSelect').value;
            await stopScanner();
            setTimeout(() => { initScanner(currentFacingMode); }, 500);
        });

        document.getElementById('cameraSelect').addEventListener('change', async (e) => {
            currentFacingMode = e.target.value;
            await stopScanner();
            setTimeout(() => { initScanner(currentFacingMode); }, 500);
        });

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = `status-box status-${type}`;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, type === 'success' ? 2500 : 4000);
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                try { await html5QrCode.stop(); } catch (err) { console.error(err); }
            }
        }

        async function initScanner(facingModeValue) {
            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
            const readerElement = document.getElementById("reader");
            readerElement.innerHTML = "";
            try {
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: facingModeValue }, config, onScanSuccess, () => {});
            } catch (err) {
                readerElement.innerHTML = `
                    <div style="padding: 50px; color: #f44336;">
                        <p style="font-size: 3rem; margin-bottom: 10px;">📷</p>
                        <p><strong>Kamera tidak bisa diakses</strong></p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">
                            Pastikan:<br>1. Browser memiliki izin akses kamera<br>
                            2. Menggunakan HTTPS atau localhost<br>3. Perangkat memiliki kamera
                        </p>
                        <button onclick="location.reload()" style="margin-top:15px;padding:10px 20px;background:#1976d2;color:white;border:none;border-radius:6px;cursor:pointer;">Coba Lagi</button>
                    </div>`;
                showStatus('⚠️ Kamera gagal diakses. Periksa izin browser.', 'warning');
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessingScan) return;
            isProcessingScan = true;

            const parts = decodedText.trim().split(':');
            if (parts.length < 3) {
                showStatus('❌ Format QR tidak valid!', 'error');
                setTimeout(() => { isProcessingScan = false; }, 3000);
                return;
            }

            const [nis, nama, kelas] = parts;
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            try {
                const qCek = query(collection(db, 'absensi'), where('siswa_nis', '==', nis), where('tanggal', '==', todayStr));
                const snapshotCek = await getDocs(qCek);

                if (!snapshotCek.empty) {
                    showStatus(`⚠️ ${nama} sudah absen hari ini!`, 'warning');
                    setTimeout(() => { isProcessingScan = false; }, 3000);
                    return;
                }

                await addDoc(collection(db, 'absensi'), {
                    siswa_nis: nis, siswa_nama: nama, siswa_kelas: kelas,
                    tanggal: todayStr, jam: today.toLocaleTimeString('id-ID'),
                    timestamp: serverTimestamp(), scanned_by: currentUser.email, status: 'hadir'
                });

                showStatus(`✅ ${nama} (${kelas}) berhasil absen!`, 'success');
                loadTodayLog();
            } catch (err) {
                showStatus('❌ Gagal simpan: ' + err.message, 'error');
            } finally {
                setTimeout(() => { isProcessingScan = false; }, 2500);
            }
        }

        async function loadTodayLog() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            try {
                const snapshot = await getDocs(query(collection(db, 'absensi'), where('tanggal', '==', todayStr)));
                const tbody = document.getElementById('logBody');
                const loadingText = document.getElementById('loadingLog');
                const logTable = document.getElementById('logTable');
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    loadingText.textContent = 'Belum ada absensi hari ini.';
                    loadingText.style.display = 'block';
                    logTable.style.display = 'none';
                    return;
                }

                loadingText.style.display = 'none';
                logTable.style.display = 'table';

                let listAbsen = [];
                snapshot.forEach(doc => listAbsen.push(doc.data()));
                listAbsen.sort((a, b) => (b.jam || "").localeCompare(a.jam || ""));

                listAbsen.forEach(data => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:600;color:#1976d2;">${data.jam || '-'}</td>
                            <td>${data.siswa_nis || '-'}</td>
                            <td style="font-weight:500;">${data.siswa_nama || '-'}</td>
                            <td>${data.siswa_kelas || '-'}</td>
                        </tr>`;
                });
            } catch (err) {
                document.getElementById('loadingLog').textContent = 'Gagal memuat data: ' + err.message;
            }
        }

        checkLoginAndInit();
    </script>
</body>
</html>
