<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAN - Scan Absensi</title>
    <link rel="icon" type="image/png" href="assets/images/icon-app.png">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .scanner-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        .status-box { padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; font-weight: 600; display: none; }
        .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .status-warning { background: #fff3e0; color: #e65100; border: 1px solid #ff9800; }
        .status-error { background: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .log-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .log-box h3 { margin-bottom: 15px; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #0d47a1; }
        .btn-logout { background: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📷 SICAN - Scan Absensi</h1>
        <p>Scan QR Code Kartu Pelajar untuk Absensi Otomatis</p>
        <button id="btnLogout" class="btn-logout">Logout</button>
    </div>

    <div class="container">
        <div class="scanner-box">
            <div id="reader"></div>
            <div id="statusBox" class="status-box"></div>
        </div>

        <div class="log-box">
            <h3>📋 Riwayat Absensi Hari Ini</h3>
            <div id="loadingLog" style="text-align:center; padding:10px; color:#666;">Memuat data...</div>
            <table id="logTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Menggunakan konfigurasi resmi sipelita-digital secara langsung
        const firebaseConfig = {
            apiKey: "AIzaSyB24GCKSTPGlN9HG9E6uhCECVa4ibCpKEA",
            authDomain: "sipelita-digital.firebaseapp.com",
            databaseURL: "https://sipelita-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sipelita-digital",
            storageBucket: "sipelita-digital.firebasestorage.app",
            messagingSenderId: "787840817745",
            appId: "1:787840817745:web:e6b5237cfbb5e51be93670",
            measurementId: "G-1D5DWJV54E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let html5QrCode = null;
        let isProcessingScan = false; // Mencegah scan ganda akibat jepretan kamera beruntun

        // Cek Status Login Pengguna/Guru
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                initScanner();
                loadTodayLog();
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('Yakin ingin keluar dari sistem SICAN?')) {
                if(html5QrCode) {
                    try { await html5QrCode.stop(); } catch(e) {}
                }
                await signOut(auth);
                window.location.href = 'login.html';
            }
        });

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            if(!box) return;
            box.textContent = msg;
            box.className = `status-box status-${type}`;
            box.style.display = 'block';
            
            // Kunci status warning/error sedikit lebih lama agar terbaca jelas
            const duration = type === 'success' ? 2500 : 4000;
            setTimeout(() => { box.style.display = 'none'; }, duration);
        }

        async function initScanner() {
            const config = { fps: 6, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    () => {} // mengabaikan log kegagalan bidik frame mini
                );
            } catch (err) {
                console.error("Kamera gagal diakses:", err);
                showStatus('⚠️ Mohon izinkan akses kamera perangkat untuk memindai QR.', 'warning');
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessingScan) return; // Abaikan pembacaan jika proses input data sebelumnya belum selesai
            isProcessingScan = true;

            // Ekspektasi Format QR Kartu Pelajar -> NIS:NAMA:KELAS
            const parts = decodedText.trim().split(':');
            if (parts.length < 3) {
                showStatus('❌ Format QR Code salah atau tidak dikenali!', 'error');
                setTimeout(() => { isProcessingScan = false; }, 3000);
                return;
            }

            const [nis, nama, kelas] = parts;
            
            // Format pencatatan tanggal lokal (WIB/WITA/WIT sesuai gadget)
            const localDate = new Date();
            const todayStr = localDate.getFullYear() + '-' + 
                             String(localDate.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(localDate.getDate()).padStart(2, '0');

            try {
                // Periksa apakah siswa terkait sudah terekam hadir pada tanggal hari ini
                const qCek = query(collection(db, 'absensi'), where('siswa_nis', '==', nis), where('tanggal', '==', todayStr));
                const snapshotCek = await getDocs(qCek);

                if (!snapshotCek.empty) {
                    showStatus(`⚠️ ${nama} sudah melakukan absensi hari ini!`, 'warning');
                    setTimeout(() => { isProcessingScan = false; }, 3000);
                    return;
                }

                // Kirim record baru ke Firestore koleksi 'absensi'
                await addDoc(collection(db, 'absensi'), {
                    siswa_nis: nis,
                    siswa_nama: nama,
                    siswa_kelas: kelas,
                    tanggal: todayStr,
                    jam: localDate.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                    timestamp: serverTimestamp(),
                    scanned_by: currentUser.email,
                    status: 'hadir'
                });

                showStatus(`✅ Absensi ${nama} (${kelas}) berhasil dicatat!`, 'success');
                loadTodayLog(); // Perbarui tampilan tabel histori

            } catch (err) {
                console.error('Proses simpan database gagal:', err);
                showStatus('❌ Gagal menginput absensi: ' + err.message, 'error');
            } {
                // Berikan jeda waktu 2.5 detik sebelum kamera siap menerima scan murid berikutnya
                setTimeout(() => { isProcessingScan = false; }, 2500);
            }
        }

        async function loadTodayLog() {
            const localDate = new Date();
            const todayStr = localDate.getFullYear() + '-' + 
                             String(localDate.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(localDate.getDate()).padStart(2, '0');
            
            // Solusi Perbaikan Utama: Hapus pengurutan orderBy jika struktur indeks belum siap, 
            // kita lakukan sorting data secara lokal menggunakan JavaScript agar aman dari error Firestore.
            const qLog = query(collection(db, 'absensi'), where('tanggal', '==', todayStr));
            
            try {
                const snapshot = await getDocs(qLog);
                const tbody = document.getElementById('logBody');
                const loadingText = document.getElementById('loadingLog');
                const logTable = document.getElementById('logTable');
                
                if (!tbody) return;
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    loadingText.textContent = 'Belum ada data siswa masuk hari ini.';
                    loadingText.style.display = 'block';
                    logTable.style.display = 'none';
                    return;
                }

                loadingText.style.display = 'none';
                logTable.style.display = 'table';

                // Array penampung untuk diurutkan secara manual
                let listAbsen = [];
                snapshot.forEach(doc => {
                    listAbsen.push(doc.data());
                });

                // Urutkan data berdasarkan jam terbaru (descending)
                listAbsen.sort((a, b) => (b.jam || "").localeCompare(a.jam || ""));

                listAbsen.forEach(data => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 600; color: #1976d2;">${data.jam || '-'}</td>
                            <td>${data.siswa_nis || '-'}</td>
                            <td style="font-weight: 500;">${data.siswa_nama || '-'}</td>
                            <td>${data.siswa_kelas || '-'}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Gagal memperbarui riwayat:', err);
                document.getElementById('loadingLog').textContent = '⚠️ Gangguan memuat riwayat: ' + err.message;
            }
        }
    </script>
</body>
</html>
