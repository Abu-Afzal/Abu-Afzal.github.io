<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAN - Scan Absensi</title>
    <link rel="icon" type="image/png" href="assets/images/icon-app.png">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .scanner-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        .status-box { padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; font-weight: 600; display: none; }
        .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .status-warning { background: #fff3e0; color: #e65100; border: 1px solid #ff9800; }
        .status-error { background: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .log-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .log-box h3 { margin-bottom: 15px; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #0d47a1; }
        .btn-logout { background: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📷 SICAN - Scan Absensi</h1>
        <p>Scan QR Code Kartu Pelajar untuk Absensi Otomatis</p>
        <button id="btnLogout" class="btn-logout">Logout</button>
    </div>

    <div class="container">
        <div class="scanner-box">
            <div id="reader"></div>
            <div id="statusBox" class="status-box"></div>
        </div>

        <div class="log-box">
            <h3>📋 Riwayat Absensi Hari Ini</h3>
            <div id="loadingLog" style="text-align:center; padding:10px; color:#666;">Memuat data...</div>
            <table id="logTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from '../js/firebase-config.js';
        import { collection, addDoc, query, where, getDocs, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const auth = getAuth();
        let currentUser = null;

        // Cek Login
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                currentUser = user;
                initScanner();
                loadTodayLog();
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('Yakin ingin keluar?')) {
                await signOut(auth);
                window.location.href = 'login.html';
            }
        });

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = `status-box status-${type}`;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 3000);
        }

        async function initScanner() {
            const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
            const html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    () => {} // ignore errors
                );
            } catch (err) {
                showStatus('⚠️ Izinkan akses kamera untuk scan QR', 'warning');
            }
        }

        async function onScanSuccess(decodedText) {
            // Format QR: NIS:NAMA:KELAS
            const parts = decodedText.trim().split(':');
            if (parts.length < 3) {
                showStatus('❌ Format QR tidak valid!', 'error');
                return;
            }

            const [nis, nama, kelas] = parts;
            const today = new Date().toISOString().split('T')[0];

            try {
                // Cek duplikasi hari ini
                const q = query(collection(db, 'absensi'), where('siswa_nis', '==', nis), where('tanggal', '==', today));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    showStatus(`⚠️ ${nama} sudah absen hari ini!`, 'warning');
                    return;
                }

                // Simpan ke Firestore
                await addDoc(collection(db, 'absensi'), {
                    siswa_nis: nis,
                    siswa_nama: nama,
                    siswa_kelas: kelas,
                    tanggal: today,
                    jam: new Date().toLocaleTimeString('id-ID'),
                    timestamp: serverTimestamp(),
                    scanned_by: currentUser.email,
                    status: 'hadir'
                });

                showStatus(`✅ ${nama} (${kelas}) berhasil absen!`, 'success');
                loadTodayLog(); // Refresh tabel

            } catch (err) {
                console.error('Scan Error:', err);
                showStatus('❌ Gagal menyimpan data: ' + err.message, 'error');
            }
        }

        async function loadTodayLog() {
            const today = new Date().toISOString().split('T')[0];
            const q = query(collection(db, 'absensi'), where('tanggal', '==', today), orderBy('timestamp', 'desc'));
            
            try {
                const snapshot = await getDocs(q);
                const tbody = document.getElementById('logBody');
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    document.getElementById('loadingLog').textContent = 'Belum ada absensi hari ini';
                    document.getElementById('logTable').style.display = 'none';
                    return;
                }

                document.getElementById('loadingLog').style.display = 'none';
                document.getElementById('logTable').style.display = 'table';

                snapshot.forEach(doc => {
                    const data = doc.data();
                    tbody.innerHTML += `
                        <tr>
                            <td>${data.jam}</td>
                            <td>${data.siswa_nis}</td>
                            <td>${data.siswa_nama}</td>
                            <td>${data.siswa_kelas}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Load Log Error:', err);
            }
        }
    </script>
</body>
</html>
