<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kelola Kegiatan Pembiasaan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
    color:#334155;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:14px;
    box-shadow:0 4px 15px rgba(0,0,0,.06);
    margin-bottom:20px;
}

h1{
    margin-bottom:20px;
    color:#1e3a8a;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
}

button{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:700;
}

button:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
}

th{
    background:#f8fafc;
    color:#1e3a8a;
}

.badge{
    background:#dcfce7;
    color:#166534;
    padding:4px 10px;
    border-radius:6px;
    font-size:.8rem;
    font-weight:700;
}

.btn-hapus{
    background:#dc2626;
}

.btn-hapus:hover{
    background:#b91c1c;
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🕌 Kelola Kegiatan Pembiasaan</h1>

        <div class="form-group">
            <label>Nama Kegiatan</label>
            <input type="text" id="namaKegiatan"
                   placeholder="Contoh: Sholat Dzuhur">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="statusKegiatan">
                <option value="aktif">Aktif</option>
                <option value="nonaktif">Nonaktif</option>
            </select>
        </div>

        <button id="btnSimpan">
            💾 Simpan Kegiatan
        </button>

    </div>

    <div class="card">

        <h2 style="margin-bottom:15px;">
            📋 Daftar Kegiatan
        </h2>

        <table>

            <thead>
                <tr>
                    <th>Nama Kegiatan</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>

            <tbody id="tbodyKegiatan">
                <tr>
                    <td colspan="3">
                        Memuat data...
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

<script type="module" src="../js/pembiasaan.js"></script>

</body>
</html>
