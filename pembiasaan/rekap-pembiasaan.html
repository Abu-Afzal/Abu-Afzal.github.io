<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rekap Pembiasaan</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#f1f5f9;
    padding:20px;
}

.card{
    background:white;
    border-radius:14px;
    padding:25px;
    max-width:1200px;
    margin:auto;
    box-shadow:0 4px 15px rgba(0,0,0,.06);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #e2e8f0;
}

th{
    background:#f8fafc;
    color:#1e3a8a;
}

select{
    padding:10px;
    border-radius:8px;
}

button{
    padding:10px 16px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="card">

    <h1>📊 Rekap Pembiasaan</h1>

    <div style="margin-top:15px;display:flex;gap:10px;">

        <select id="filterKegiatan">
            <option value="SEMUA">Semua Kegiatan</option>
        </select>

        <button id="btnLoad">
            Tampilkan
        </button>

    </div>

    <table>

        <thead>
            <tr>
                <th>No</th>
                <th>Kegiatan</th>
                <th>NIS</th>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Tanggal</th>
                <th>Jam</th>
            </tr>
        </thead>

        <tbody id="tbodyRekap">
            <tr>
                <td colspan="7">
                    Memuat...
                </td>
            </tr>
        </tbody>

    </table>

</div>

<script type="module">

import { db } from "../js/firebase-config.js";

import {
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const tbody =
    document.getElementById('tbodyRekap');

const filterKegiatan =
    document.getElementById('filterKegiatan');


// ============================
// LOAD KEGIATAN
// ============================

async function loadKegiatan(){

    const snapshot =
        await getDocs(collection(db,'master_kegiatan'));

    snapshot.forEach(doc=>{

        const data = doc.data();

        filterKegiatan.innerHTML += `
            <option value="${data.nama}">
                ${data.nama}
            </option>
        `;

    });

}

loadKegiatan();


// ============================
// LOAD REKAP
// ============================

async function loadRekap(){

    tbody.innerHTML=`
        <tr>
            <td colspan="7">
                Memuat data...
            </td>
        </tr>
    `;

    const snapshot =
        await getDocs(collection(db,'absensi_kegiatan'));

    tbody.innerHTML='';

    let no=1;

    snapshot.forEach(doc=>{

        const data = doc.data();

        const filter =
            filterKegiatan.value;

        if(
            filter!=='SEMUA' &&
            data.kegiatan!==filter
        ){
            return;
        }

        tbody.innerHTML += `
            <tr>

                <td>${no++}</td>

                <td>
                    ${data.kegiatan}
                </td>

                <td>
                    ${data.siswa_nis}
                </td>

                <td>
                    ${data.siswa_nama}
                </td>

                <td>
                    ${data.siswa_kelas}
                </td>

                <td>
                    ${data.tanggal}
                </td>

                <td>
                    ${data.jam}
                </td>

            </tr>
        `;

    });

}

document.getElementById('btnLoad')
.addEventListener('click',loadRekap);

loadRekap();

</script>

</body>
</html>
