<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAN - Scan Absensi</title>
    <link rel="icon" type="image/png" href="assets/images/icon-app.png">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: linear-gradient(135deg, #0d47a1, #1976d2); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .header p { opacity: 0.9; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        
        .scanner-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        
        .camera-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .select-camera { padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 0.9rem; background: #fff; outline: none; min-width: 200px; }
        .btn-camera { background: #1976d2; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: 0.2s; }
        .btn-camera:hover { background: #0d47a1; }
        
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; overflow: hidden; background: #fafafa; border: 2px dashed #ccc; }
        .status-box { padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; font-weight: 600; display: none; }
        .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #4caf50; }
        .status-warning { background: #fff3e0; color: #e65100; border: 1px solid #ff9800; }
        .status-error { background: #ffebee; color: #c62828; border: 1px solid #f44336; }
        .log-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .log-box h3 { margin-bottom: 15px; color: #0d47a1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #0d47a1; }
        .btn-logout { background: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📷 SICAN - Scan Absensi</h1>
        <p>Scan QR Code Kartu Pelajar untuk Absensi Otomatis</p>
        
        <div style="margin-top: 15px; display: flex; justify-content: center; gap: 10px; align-items: center;">
            <a href="index.html" style="background: rgba(255,255,255,0.15); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.4); display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">
                🏠 Kembali ke Dashboard Utama
            </a>
            <button id="btnLogout" class="btn-logout">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="scanner-box">
            <div class="camera-controls">
                <select id="cameraSelect" class="select-camera">
                    <option value="environment">Kamera Belakang (Default)</option>
                    <option value="user">Kamera Depan (Selfie)</option>
                </select>
                <button id="btnToggleCamera" class="btn-camera">Ganti Kamera</button>
            </div>

            <div id="reader"></div>
            <div id="statusBox" class="status-box"></div>
        </div>

        <div class="log-box">
            <h3>📋 Riwayat Absensi Hari Ini</h3>
            <div id="loadingLog" style="text-align:center; padding:10px; color:#666;">Memuat data...</div>
            <table id="logTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>NIS</th>
                        <th>Nama</th>
                        <th>Kelas</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB24GCKSTPGlN9HG9E6uhCECVa4ibCpKEA",
            authDomain: "sipelita-digital.firebaseapp.com",
            databaseURL: "https://sipelita-digital-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sipelita-digital",
            storageBucket: "sipelita-digital.firebasestorage.app",
            messagingSenderId: "787840817745",
            appId: "1:787840817745:web:e6b5237cfbb5e51be93670",
            measurementId: "G-1D5DWJV54E"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let html5QrCode = null;
        let isProcessingScan = false;
        let currentFacingMode = "environment";

        // Proteksi Akun Sejajar Folder
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html'; // Tepat mencari ke folder utama sejajar
            } else {
                currentUser = user;
                initScanner(currentFacingMode);
                loadTodayLog();
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            if (confirm('Yakin ingin keluar dari sistem SICAN?')) {
                await stopScanner();
                await signOut(auth);
                window.location.href = 'login.html';
            }
        });

        document.getElementById('btnToggleCamera').addEventListener('click', async () => {
            const cameraSelect = document.getElementById('cameraSelect');
            currentFacingMode = cameraSelect.value;
            await stopScanner();
            setTimeout(() => { initScanner(currentFacingMode); }, 400); // Jeda hardware melepaskan sensor stream
        });

        document.getElementById('cameraSelect').addEventListener('change', async (e) => {
            currentFacingMode = e.target.value;
            await stopScanner();
            setTimeout(() => { initScanner(currentFacingMode); }, 400);
        });

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            if(!box) return;
            box.textContent = msg;
            box.className = `status-box status-${type}`;
            box.style.display = 'block';
            const duration = type === 'success' ? 2500 : 4000;
            setTimeout(() => { box.style.display = 'none'; }, duration);
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                try {
                    await html5QrCode.stop();
                } catch (err) {
                    console.error("Gagal menghentikan kamera aktif:", err);
                }
            }
        }

        async function initScanner(facingModeValue) {
            const config = { 
                fps: 12, 
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
                    return { width: Math.floor(minEdge * 0.7), height: Math.floor(minEdge * 0.7) };
                }, 
                aspectRatio: 1.0,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };
            
            const readerElement = document.getElementById("reader");
            if (readerElement) { readerElement.innerHTML = ""; } // Reset wadah tangkapan video
            
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: facingModeValue },
                    config,
                    onScanSuccess,
                    () => {}
                );
            } catch (err) {
                console.error("Kamera gagal diakses:", err);
                showStatus('⚠️ Akses kamera terganggu. Pastikan izin kamera aktif.', 'warning');
            }
        }

        async function onScanSuccess(decodedText) {
            if (isProcessingScan) return;
            isProcessingScan = true;

            // Memisahkan karakter dengan toleransi spasi liar
            let separator = ':';
            if (!decodedText.includes(':') && decodedText.includes(',')) { separator = ','; }

            const parts = decodedText.trim().split(separator).map(item => item.trim());
            if (parts.length < 3 || parts[0] === "" || parts[1] === "") {
                showStatus(`❌ Format QR tidak valid! Terbaca: "${decodedText}"`, 'error');
                setTimeout(() => { isProcessingScan = false; }, 3000);
                return;
            }

            const [nis, nama, kelas] = parts;
            const localDate = new Date();
            const todayStr = localDate.getFullYear() + '-' + 
                             String(localDate.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(localDate.getDate()).padStart(2, '0');

            try {
                const qCek = query(collection(db, 'absensi'), where('siswa_nis', '==', nis), where('tanggal', '==', todayStr));
                const snapshotCek = await getDocs(qCek);

                if (!snapshotCek.empty) {
                    showStatus(`⚠️ ${nama} sudah melakukan absensi hari ini!`, 'warning');
                    setTimeout(() => { isProcessingScan = false; }, 3000);
                    return;
                }

                await addDoc(collection(db, 'absensi'), {
                    siswa_nis: nis,
                    siswa_nama: nama,
                    siswa_kelas: kelas,
                    tanggal: todayStr,
                    jam: localDate.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                    timestamp: serverTimestamp(),
                    scanned_by: currentUser.email,
                    status: 'hadir'
                });

                showStatus(`✅ Absensi ${nama} (${kelas}) berhasil dicatat!`, 'success');
                loadTodayLog();

            } catch (err) {
                showStatus('❌ Gagal menginput absensi: ' + err.message, 'error');
            } finally {
                setTimeout(() => { isProcessingScan = false; }, 2500);
            }
        }

        async function loadTodayLog() {
            const localDate = new Date();
            const todayStr = localDate.getFullYear() + '-' + 
                             String(localDate.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(localDate.getDate()).padStart(2, '0');
            
            const qLog = query(collection(db, 'absensi'), where('tanggal', '==', todayStr));
            
            try {
                const snapshot = await getDocs(qLog);
                const tbody = document.getElementById('logBody');
                const loadingText = document.getElementById('loadingLog');
                const logTable = document.getElementById('logTable');
                
                if (!tbody) return;
                tbody.innerHTML = '';

                if (snapshot.empty) {
                    loadingText.textContent = 'Belum ada data siswa masuk hari ini.';
                    loadingText.style.display = 'block';
                    logTable.style.display = 'none';
                    return;
                }

                loadingText.style.display = 'none';
                logTable.style.display = 'table';

                let listAbsen = [];
                snapshot.forEach(doc => { listAbsen.push(doc.data()); });
                listAbsen.sort((a, b) => (b.jam || "").localeCompare(a.jam || ""));

                listAbsen.forEach(data => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 600; color: #1976d2;">${data.jam || '-'}</td>
                            <td>${data.siswa_nis || '-'}</td>
                            <td style="font-weight: 500;">${data.siswa_nama || '-'}</td>
                            <td>${data.siswa_kelas || '-'}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Gagal memperbarui riwayat:', err);
            }
        }
    </script>
</body>
</html>
