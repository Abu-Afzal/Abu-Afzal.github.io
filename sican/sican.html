<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SICAN Multi Kegiatan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Segoe UI;
    background:#f5f7fa;
    margin:0;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

#reader{
    width:100%;
}

.hasil-scan{
    text-align:center;
    padding:25px;
}

.nama{
    font-size:2rem;
    font-weight:bold;
    color:#1565c0;
}

.kelas{
    color:#555;
    margin-top:10px;
}

.kegiatan{
    margin-top:15px;
    font-weight:bold;
    color:#2e7d32;
}

/* ══════════════════════════════════════════════ */
/* SUCCESS NOTIFICATION OVERLAY */
/* ══════════════════════════════════════════════ */
.success-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    animation: fadeIn 0.3s ease;
}

.success-modal {
    background: #1e1e2e;
    border-radius: 24px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
    animation: slideUp 0.4s ease;
    min-width: 350px;
    max-width: 90%;
}

.success-icon {
    width: 90px;
    height: 90px;
    margin: 0 auto 25px;
    background: rgba(16, 185, 129, 0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.success-icon svg {
    width: 60px;
    height: 60px;
    animation: scaleIn 0.5s ease;
}

.success-title {
    color: #ffffff;
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 20px 0;
    font-family: 'Segoe UI', sans-serif;
    letter-spacing: 0.5px;
}

.success-name {
    color: #ffffff;
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 15px 0;
    font-family: 'Segoe UI', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.3;
}

.success-status {
    color: #94a3b8;
    font-size: 16px;
    font-weight: 500;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { 
        transform: translateY(50px);
        opacity: 0;
    }
    to { 
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes scaleIn {
    from { 
        transform: scale(0);
        opacity: 0;
    }
    50% {
        transform: scale(1.1);
    }
    to { 
        transform: scale(1);
        opacity: 1;
    }
}

/* Responsive */
@media (max-width: 768px) {
    .success-modal {
        padding: 40px 30px;
        min-width: 280px;
    }
    
    .success-title {
        font-size: 26px;
    }
    
    .success-name {
        font-size: 20px;
    }
    
    .success-icon {
        width: 70px;
        height: 70px;
    }
    
    .success-icon svg {
        width: 45px;
        height: 45px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>📷 SICAN MULTI KEGIATAN</h1>
</div>
    
<div style="text-align: center; margin: 10px 0;">
    <button id="btnSwitchCamera" style="background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2); display: inline-flex; align-items: center; gap: 8px;">
        🔄 Ganti Kamera
    </button>
</div>
    
<div class="container">

    <div class="card">
        <label>Pilih Kegiatan</label>
        <select id="kegiatanSelect">
            <option>Memuat kegiatan...</option>
        </select>
    </div>

    <div class="card">
        <div id="reader"></div>
    </div>
    
    <div id="resultContainer" class="scan-result-card" style="display: none;">
        <div class="card-badge">
            <span class="badge-icon">✓</span> ABSENSI BERHASIL
        </div>
        
        <h2 id="namaSiswa" class="student-name">Nama Siswa</h2>
        <p id="kelasSiswa" class="student-class">Kelas XX</p>
        
        <div class="divider"></div>
        
        <div class="info-row">
            <span class="info-label">Kegiatan:</span>
            <span id="kegiatanAktif" class="info-value">Nama Kegiatan</span>
        </div>
        
        <div class="time-badge">
            <span id="jamAbsen">00:00:00</span>
        </div>
    </div>

</div>

<!-- ══════════════════════════════════════════════ -->
<!-- SUCCESS NOTIFICATION OVERLAY -->
<!-- ══════════════════════════════════════════════ -->
<div id="successOverlay" class="success-overlay">
    <div class="success-modal">
        <div class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#10b981" stroke-width="2.5"/>
                <path d="M8 12L11 15L16 9" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2 class="success-title">Berhasil!</h2>
        <p class="success-name" id="successStudentName">NAMA SISWA</p>
        <p class="success-status" id="successStatusText">Absen MASUK Berhasil!</p>
    </div>
</div>

<script type="module" src="../js/sican-core.js"></script>

<script>
// ══════════════════════════════════════════════
// SUCCESS NOTIFICATION FUNCTION
// ══════════════════════════════════════════════
function showSuccessNotification(studentName, status = 'MASUK') {
    const overlay = document.getElementById('successOverlay');
    const nameEl = document.getElementById('successStudentName');
    const statusEl = document.getElementById('successStatusText');
    
    // Update konten
    nameEl.textContent = studentName.toUpperCase();
    statusEl.textContent = `Absen ${status} Berhasil!`;
    
    // Tampilkan overlay
    overlay.style.display = 'flex';
    
    // Auto close setelah 2.5 detik
    setTimeout(() => {
        overlay.style.display = 'none';
    }, 2500);
}

// Export fungsi ke window agar bisa dipanggil dari sican-core.js
window.showSuccessNotification = showSuccessNotification;
</script>

</body>
</html>
