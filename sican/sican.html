<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>SICAN Multi Kegiatan</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Segoe UI;
    background:#f5f7fa;
    margin:0;
}

.header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

#reader{
    width:100%;
}

.hasil-scan{
    text-align:center;
    padding:25px;
}

.nama{
    font-size:2rem;
    font-weight:bold;
    color:#1565c0;
}

.kelas{
    color:#555;
    margin-top:10px;
}

.kegiatan{
    margin-top:15px;
    font-weight:bold;
    color:#2e7d32;
}

</style>
</head>

<body>

<div class="header">
    <h1>📷 SICAN MULTI KEGIATAN</h1>
</div>
    
<div style="text-align: center; margin: 10px 0;">
    <button id="btnSwitchCamera" style="background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 24px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2); display: inline-flex; align-items: center; gap: 8px;">
        🔄 Ganti Kamera
    </button>
</div>
    
<div class="container">

    <div class="card">

        <label>Pilih Kegiatan</label>

        <select id="kegiatanSelect">
            <option>Memuat kegiatan...</option>
        </select>

    </div>

    <div class="card">
        <div id="reader"></div>
    <div id="resultContainer" class="scan-result-card" style="display: none;">
    <div class="card-badge">
        <span class="badge-icon">✓</span> ABSENSI BERHASIL
    </div>
    
    <h2 id="namaSiswa" class="student-name">Nama Siswa</h2>
    <p id="kelasSiswa" class="student-class">Kelas XX</p>
    
    <div class="divider"></div>
    
    <div class="info-row">
        <span class="info-label">Kegiatan:</span>
        <span id="kegiatanAktif" class="info-value">Nama Kegiatan</span>
    </div>
    
    <div class="time-badge">
        <span id="jamAbsen">00:00:00</span>
    </div>
</div>

<script type="module" src="../js/sican-core.js"></script>

</body>
</html>
