<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAN - Admin Master Siswa</title>
    <link rel="icon" type="image/png" href="../assets/images/sipelita-app.png">
    
    <!-- Library SheetJS (XLSX), QR Code & JSZip -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; }
        .header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 24px; text-align: center; }
        .header h1 { margin-bottom: 6px; }
        .container { max-width: 1200px; margin: 25px auto; padding: 0 15px; }
        .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,.06); }
        
        .grid-input { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: .85rem; font-weight: 600; }
        input[type="file"] { padding: 10px; border: 2px dashed #cbd5e1; border-radius: 8px; background: #f8fafc; cursor: pointer; text-align: center; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: all 0.2s; }
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-warning { background: #d97706; }
        .btn-danger { background: #dc2626; padding: 6px 12px; font-size: 0.8rem; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-info { background: #0891b2; }
        .btn-info:hover { background: #0e7490; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* ===== TAB & SHEET STYLES ===== */
        .class-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .class-tab {
            padding: 10px 18px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            transition: all 0.2s;
        }
        .class-tab:hover { background: #cbd5e1; }
        .class-tab.active { background: #1e3a8a; color: white; }
        .class-tab .count { background: rgba(255,255,255,0.3); padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 6px; }

        .class-sheet { display: none; animation: fadeIn 0.3s; }
        .class-sheet.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            border-left: 4px solid #2563eb;
            flex-wrap: wrap;
            gap: 10px;
        }
        .sheet-title { font-size: 16px; font-weight: 700; color: #1e3a8a; }
        .sheet-actions { display: flex; gap: 8px; flex-wrap: wrap; }

        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f1f5f9; color: #1e3a8a; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: #fafafa; }
        .text-center { text-align: center; }
        .template-link { font-size: 0.9rem; color: #2563eb; text-decoration: none; font-weight: 600; }
        .template-link:hover { text-decoration: underline; }
        
        /* QR Code Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 30px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #e2e8f0; }
        .qr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .qr-card { border: 2px solid #e2e8f0; border-radius: 10px; padding: 15px; text-align: center; background: white; }
        .qr-card h3 { margin: 10px 0 5px; font-size: 14px; color: #1e3a8a; }
        .qr-card p { margin: 3px 0; font-size: 12px; color: #64748b; }
        .qr-code-container { margin: 10px auto; display: inline-block; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .loading { text-align: center; padding: 40px; font-size: 16px; color: #64748b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top: 3px solid #2563eb; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Print Styles */
        @media print {
            .no-print { display: none !important; }
            .class-sheet { display: none !important; }
            .class-sheet.active { display: block !important; page-break-after: always; }
            body { background: white; }
            .card { box-shadow: none; border: 1px solid #ddd; }
        }
    each class.
        let currentQRClassData = [];

        // =========================================================================
        // JALUR SAVE: BATCH WRITE LANGSUNG KE KOLEKSI 'sican_siswa'
        // =========================================================================
        btnUpload.addEventListener('click', () => {
            const file = excelFileInput.files[0];
            if (!file) {
                alert('Pilih file Excel terlebih dahulu!');
                return;
            }

            btnUpload.disabled = true;
            btnUpload.textContent = 'Menyimpan ke Sistem... ⏳';

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonSiswa = XLSX.utils.sheet_to_json(worksheet);

                    if (jsonSiswa.length === 0) throw new Error("File kosong atau format tidak sesuai.");

                    const batch = writeBatch(db);
                    const collectionRef = collection(db, "sican_siswa");
                    let totalData = 0;

                    jsonSiswa.forEach((item) => {
                        const nisSiswa = item.nis ? String(item.nis).trim() : null;
                        const namaSiswa = item.nama ? String(item.nama).trim() : null;
                        const kelasSiswa = item.kelas ? String(item.kelas).trim() : '-';

                        if (nisSiswa && namaSiswa) {
                            const newDocRef = doc(collectionRef);
                            batch.set(newDocRef, {
                                nis: nisSiswa,
                                nama: namaSiswa,
                                kelas: kelasSiswa,
                                createdAt: new Date().toISOString()
                            });
                            totalData++;
                        }
                    });

                    if (totalData > 0) {
                        await batch.commit();
                        alert(`Sukses! ${totalData} siswa telah ditambahkan.`);
                        excelFileInput.value = ''; 
                        loadMasterSiswaSICAN(); 
                    } else {
                        alert("Tidak ada data valid. Pastikan kolom Excel: 'nis', 'nama', 'kelas' (huruf kecil).");
                    }
                } catch (err) {
                    console.error(err);
                    alert("Gagal memproses berkas Excel: " + err.message);
                } finally {
                    btnUpload.disabled = false;
                    btnUpload.textContent = '🚀 Unggah Data Master';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // =========================================================================
        // JALUR LOAD: KELOMPOKKAN DATA BERDASARKAN KELAS
        // =========================================================================
        async function loadMasterSiswaSICAN() {
            const tabsContainer = document.getElementById('classTabs');
            const sheetsContainer = document.getElementById('classSheets');
            const totalSpan = document.getElementById('totalSiswa');
            
            tabsContainer.innerHTML = '<div class="loading"><div class="spinner"></div> Memuat data...</div>';
            sheetsContainer.innerHTML = '';

            try {
                const snapshot = await getDocs(collection(db, 'sican_s'));
                allStudents = [];
                snapshot.forEach(docSnap => {
                    allStudents.push({ id: docSnap.id, ...docSnap.data() });
                });

                totalSpan.textContent = allStudents.length;

                if (allStudents.length === 0) {
                    tabsContainer.innerHTML = '';
                    sheetsContainer.innerHTML = '<div class="card text-center" style="padding:40px; color:#64748b;">Belum ada master data siswa di database SICAN.</div>';
                    return;
                }

                // Kelompokkan berdasarkan kelas
                const grouped = {};
                allStudents.forEach(s => {
                    const k = s.kelas || 'Tanpa Kelas';
                    if (!grouped[k]) grouped[k] = [];
                    grouped[k].push(s);
                });

                // Urutkan nama kelas (X, XI, XII)
                const sortedClasses = Object.keys(grouped).sort((a, b) => {
                    const extractNum = (str) => parseInt(str.match(/\d+/)?.[0] || 0);
                    const extractRomawi = (str) => str.match(/^[A-Z]+/)?.[0] || '';
                    if (extractRomawi(a) !== extractRomawi(b)) return extractRomawi(a).localeCompare(extractRomawi(b));
                    return extractNum(a) - extractNum(b);
                });

                tabsContainer.innerHTML = '';
                sheetsContainer.innerHTML = '';

                sortedClasses.forEach((kelas, index)20px; border-radius: 8px; border-left: 4px solid #2563eb; flex-wrap: wrap; gap: 10px;">
                        <div class="sheet-title">📚 Daftar Siswa Kelas ${kelas} <span style="font-size:0.85rem; color:#64748b; font-weight:400;">(${students.length} Siswa)</span></div>
                        <div class="sheet-actions no-print">
                            <button class="btn btn-success" onclick="openQRModal('${kelas}')">📱 Generate QR Kelas Ini</button>
                            <button class="btn btn-info" onclick="exportClassExcel('${kelas}')">📥 Export Excel</button>
                            <button class="btn btn-primary" onclick="printClass('${kelas}')">🖨️ Cetak Kelas</button>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 50px;">No</th>
                                    <th>NIS / NISN</th>
                                    <th>Nama Lengkap</th>
                                    <th>Kelas</th>
                                    <th class="text-center no-print" style="width: 100px;">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${students.map((siswa, idx) => `
                                    <tr>
                                        <td>${idx + 1}</td>
                                        <td><code>${siswa.nis}</code></td>
                                        <td><b>${siswa.nama}</b></td>
                                        <td>${siswa.kelas}</td>
                                        <td class="text-center no-print">
                                            <button class="btn btn-danger btn-hapus" data-id="${siswa.id}">🗑️</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                sheetsContainer.appendChild(sheet);
            });

            // Handler Hapus Dokumen
            document.querySelectorAll('.btn-hapus').forEach(button => {
                button.addEventListener('click', async (e) => {
                    const idDoc = e.target.getAttribute('data-id');
                    if (confirm("Hapus siswa ini dari database master SICAN?")) {
                        await deleteDoc(doc(db, 'sican_siswa', idDoc));
                        loadMasterSiswaSICAN();
                    }
                });
            });

        } catch (err) {
            console.error(err);
            tabsContainer.innerHTML = '';
            sheetsContainer.innerHTML = `<div class="card text-center" style="padding:40px; color:red;">Error: ${err.message}</div>`;
        }
    }

    // =========================================================================
    // FUNGSI TAB SWITCHING
    // =========================================================================
    window.switchTab = function(kelas) {
        document.querySelectorAll('.class-tab').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.class-sheet').forEach(sheet => sheet.classList.remove('active'));
        
        document.getElementById(`tab-${kelas.replace(/\s+/g, '-')}`).classList.add('active');
        document.getElementById(`sheet-${kelas.replace(/\s+/g, '-')}`).classList.add('active');
    };

    // =========================================================================
    // QR CODE GENERATION FUNCTIONS (PER KELAS)
    // =========================================================================
    window.openQRModal = async function(kelas) {
        currentQRClassData = allStudents.filter(s => s.kelas === kelas);
        
        if (currentQRClassData.length === 0) {
            alert('Tidak ada data siswa di kelas ini!');
            return;
        }

        const modal = document.getElementById('qrModal');
        const container = document.getElementById('qrContainer');
        const modalTitle = document.getElementById('modalTitle');
        
        modalTitle.textContent = `📱 QR Code Siswa - Kelas ${kelas}`;
        modal.classList.add('show');
        container.innerHTML = '<div class="loading"><div class="spinner"></div>Generating QR Codes...</div>';

        setTimeout(() => {
            container.innerHTML = '';
            currentQRClassData.forEach((siswa, index) => {
                const qrCard = document.createElement('div');
                qrCard.className = 'qr-card';
                const nis = siswa.nis || String(index + 1);
                const qrDiv = document.createElement('div');
                qrDiv.id = `qr-${siswa.id}`;
                qrDiv.className = 'qr-code-container';
                
                qrCard.innerHTML = `
                    <div id="qr-${siswa.id}"></div>
                    <h3>${siswa.nama || 'Tanpa Nama'}</h3>
                    <p>NIS: ${nis}</p>
                    <p>${siswa.kelas || '-'}</p>
                    <button class="btn btn-primary" onclick="downloadSingleQR('${siswa.id}', '${nis}')" style="margin-top: 10px; padding: 6px 12px; font-size: 0.8rem;">📥 Download</button>
                `;
                container.appendChild(qrCard);
                
                new QRCode(document.getElementById(`qr-${siswa.id}`), {
                    text: String(nis),
                    width: 128,
                    height: 
 window.printClass = function(kelas) {
        window.print(); // CSS @media print akan otomatis menyembunyikan tab lain dan hanya mencetak sheet yang aktif
    };

    // =========================================================================
    // TEMPLATE EXCEL
    // =========================================================================
    document.getElementById('downloadTemplate').addEventListener('click', (e) => {
        e.preventDefault();
        const demo = [
            { nis: "1001", nama: "Siswa Contoh A", kelas: "X MIPA 1" },
            { nis: "1002", nama: "Siswa Contoh B", kelas: "XI IPS 2" }
        ];
        const ws = XLSX.utils.json_to_sheet(demo);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Master");
        XLSX.writeFile(wb, "Template_Master_SICAN.xlsx");
    });
</script>
</body>
</html>
